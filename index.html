<!DOCTYPE html>
<html>
<head>
    <title>不動産管理マップ v4.12.4</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        #search-box-container { position: absolute; top: 10px; left: 10px; z-index: 5; display: flex; gap: 5px; align-items: center; }
        #address-input { width: 180px; padding: 10px 15px; border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 14px; outline: none; }
        #search-btn { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; font-size: 14px; font-weight: bold; }
        
        #editor-panel { display: none !important; position: fixed; top: 10px; right: 10px; z-index: 1000; background: white; padding: 0; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 440px; max-height: 95vh; overflow: hidden; display: flex; flex-direction: column; }
        .panel-header { padding: 15px 20px 10px 20px; background: white; flex-shrink: 0; }
        .panel-header h3 { margin: 0 0 5px 0; font-size: 18px; color: #1a73e8; }
        
        .tab-container { display: flex; gap: 2px; padding: 0 10px; background: #f1f3f4; border-bottom: 1px solid #ddd; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 12px; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; font-size: 12px; color: #5f6368; white-space: nowrap; margin-top: 5px; }
        .tab.active { background: white; border-color: #ddd; color: #1a73e8; font-weight: bold; position: relative; top: 1px; }
        .tab-add { color: #188038; font-weight: bold; background: #e6f4ea; border-radius: 6px; margin-bottom: 5px;}

        .panel-body { padding: 15px 20px; overflow-y: auto; flex: 1; background: white; scroll-behavior: smooth; }
        .drag-notice { font-size: 10px; color: #e67e22; margin-bottom: 10px; font-weight: bold; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        .flex-item { flex: 1; }
        .unit-label { font-size: 12px; color: #888; white-space: nowrap; width: 25px; }
        
        .sold-inline { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #cf1322; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        .sold-inline input { width: 18px !important; height: 18px !important; margin: 0; cursor: pointer; }

        #unit-price-container { background: #fffbe6; padding: 12px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; }
        .price-display { font-size: 16px; font-weight: bold; color: #d93025; }
        .siire-unit-box { background: #f6ffed; border: 1px solid #b7eb8f; padding: 10px; border-radius: 8px; text-align: center; }
        
        .btn-save { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-delete { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        input[readonly] { background-color: #f9f9f9; color: #555; }
    </style>
</head>
<body>

    <div id="search-box-container">
        <input type="text" id="address-input" placeholder="住所で新規登録" onkeydown="if(event.key==='Enter')executeSearch()">
        <button id="search-btn" onclick="executeSearch()">検索</button>
    </div>

    <div id="editor-panel">
        <div class="panel-header">
            <h3>物件登録・編集</h3>
            <div class="drag-notice">※編集中のマーカーは地図上でドラッグ移動できます</div>
        </div>
        <div class="tab-container" id="tab-bar"></div>
        <div class="panel-body" id="form-container">
            <input type="hidden" id="form-id">
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">

            <div class="section-title">基本情報</div>
            <div class="form-group">
                <div class="flex-row">
                    <div class="flex-item">
                        <label>物件種別</label>
                        <select id="form-type">
                            <option value="">選択してください</option>
                            <optgroup label="他社分譲"><option value="新築戸建">新築戸建</option><option value="中古戸建">中古戸建</option><option value="売地">売地</option></optgroup>
                            <optgroup label="自社分譲">
                                <option value="自社新築">自社新築</option><option value="自社中古">自社中古</option><option value="自社売地">自社売地</option>
                                <option value="自社新築(情開)">自社新築(情開)</option><option value="自社中古(情開)">自社中古(情開)</option><option value="自社売地(情開)">自社売地(情開)</option><option value="自社中古MS(情開)">自社中古MS(情開)</option>
                            </optgroup>
                            <optgroup label="マンション・その他"><option value="新築MS">新築MS</option><option value="中古MS">中古MS</option><option value="査定依頼">査定依頼</option><option value="査定依頼MS">査定依頼MS</option></optgroup>
                        </select>
                    </div>
                    <div class="flex-item">
                        <label>区画番号</label>
                        <input type="text" id="form-tab-name" placeholder="例：1号棟">
                    </div>
                </div>
            </div>
            <div class="form-group"><label>物件名称/売主業者の場合の業者名</label><input type="text" id="form-name" placeholder="例：㈱〇〇・〇〇シリーズ荻窪など"></div>
            <div class="form-group">
                <label>住所</label>
                <div class="flex-row">
                    <div class="flex-item"><input type="text" id="form-addr1" placeholder="市区"></div>
                    <div class="flex-item"><input type="text" id="form-addr2" placeholder="丁目"></div>
                    <div class="flex-item"><input type="text" id="form-addr3" placeholder="以降"></div>
                </div>
            </div>

            <div class="section-title">価格推移 (単位: 万円)</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>初回入力日</label><input type="text" id="form-d-first" placeholder="月/日または年/月/日（西暦）" class="date-input"></div>
                    <div class="flex-item"><label>初回価格</label><input type="text" id="form-p-first" placeholder="初回価格" class="comma-input only-num"></div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>変更日1</label><input type="text" id="form-d-c1" placeholder="月/日または年/月/日（西暦）" class="date-input"></div>
                    <div class="flex-item"><label>価格1</label><input type="text" id="form-p-c1" placeholder="変更価格1" class="comma-input only-num"></div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>変更日2</label><input type="text" id="form-d-c2" placeholder="月/日または年/月/日（西暦）" class="date-input"></div>
                    <div class="flex-item"><label>価格2</label><input type="text" id="form-p-c2" placeholder="変更価格2" class="comma-input only-num"></div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>変更日3</label><input type="text" id="form-d-c3" placeholder="月/日または年/月/日（西暦）" class="date-input"></div>
                    <div class="flex-item"><label>価格3</label><input type="text" id="form-p-c3" placeholder="変更価格3" class="comma-input only-num"></div>
                </div>
                <div class="flex-row" style="justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <label style="margin:0;">成約日 / 価格</label>
                    <div class="sold-inline"><input type="checkbox" id="form-is-sold"> 成約済</div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><input type="text" id="form-d-s" placeholder="月/日または年/月/日（西暦）" class="date-input"></div>
                    <div class="flex-item"><input type="text" id="form-p-s" placeholder="成約価格" class="comma-input only-num"></div>
                </div>
                <label>備考（価格）</label>
                <textarea id="form-price-memo" rows="2" placeholder="理由や履歴など"></textarea>
            </div>

            <div class="section-title">面積詳細</div>
            <div class="form-group">
                <label>土地面積 (㎡ / 坪)</label>
                <div class="flex-row">
                    <input type="text" id="form-t-m2" placeholder="0.00" class="comma-input only-num flex-item"><span class="unit-label">㎡</span>
                    <input type="text" id="form-t-tsubo" placeholder="0.00" class="comma-input flex-item" readonly><span class="unit-label">坪</span>
                </div>
            </div>
            <div class="form-group">
                <label>建物面積 (㎡ / 坪)</label>
                <div class="flex-row" style="margin-bottom:5px;">
                    <input type="text" id="form-b-m2" placeholder="0.00" class="comma-input only-num flex-item"><span class="unit-label">㎡</span>
                    <input type="text" id="form-b-tsubo" placeholder="0.00" class="comma-input flex-item" readonly><span class="unit-label">坪</span>
                </div>
                <label>間取り</label>
                <input type="text" id="form-layout" placeholder="4LDK">
            </div>

            <div class="section-title">単価計算（自動反映）</div>
            <div id="unit-price-container">
                <div id="build-price-input" style="display:none; margin-bottom:10px;">
                    <label style="font-size:10px; color:#c41d7f;">想定建物価格(万円)</label>
                    <input type="text" id="form-sub-price" class="comma-input only-num">
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span id="label-land" style="font-size:12px;">土地坪単価：</span>
                    <span id="val-land" class="price-display">- 万円</span>
                </div>
            </div>

            <div class="section-title">業者・取引詳細</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;">
                    <div class="flex-item"><label>業者名</label><input type="text" id="form-gyosha" placeholder="業者名"></div>
                    <div class="flex-item"><label>支店名</label><input type="text" id="form-shiten" placeholder="支店名"></div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>取引態様</label><select id="form-taiyou"><option value="">選択</option><option value="売主">売主</option><option value="仲介(専)">仲介(専)</option><option value="仲介(一般)">仲介(一般)</option><option value="販売代理">販売代理</option></select></div>
                    <div class="flex-item"><label>登録媒体</label><select id="form-media"><option value="">選択</option><option value="レインズ">レインズ</option><option value="仲介HP">仲介HP</option><option value="売主HP">売主HP</option><option value="ポータル">ポータル</option><option value="紹介">紹介</option><option value="その他">その他</option></select></div>
                </div>
                <label>紹介担当者</label>
                <input type="text" id="form-intro-user" placeholder="担当者名">
            </div>

            <div class="section-title">公法制限・接道</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;">
                    <div class="flex-item"><label>建蔽率(%)</label><input type="text" id="form-kenpei" placeholder="0"></div>
                    <div class="flex-item"><label>容積率(%)</label><input type="text" id="form-youseki" placeholder="0"></div>
                </div>
                <label>公法制限</label><input type="text" id="form-law" placeholder="１低・１高・準防火" style="margin-bottom:5px;">
                <label>接道状況</label><input type="text" id="form-road" placeholder="東側４ｍ公道">
            </div>

            <div class="section-title">交通</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;">
                    <div class="flex-item"><label>路線名</label><input type="text" id="form-train-line" placeholder="路線名"></div>
                </div>
                <div class="flex-row" style="margin-bottom:5px;">
                    <div class="flex-item"><label>最寄駅</label><input type="text" id="form-train-station" placeholder="最寄駅"></div>
                    <div class="flex-item" style="display:flex; align-items:flex-end; gap:4px;">
                        <div style="flex:1;"><label>徒歩</label><input type="text" id="form-train-walk" placeholder="分" class="only-num"></div>
                        <span class="unit-label" style="padding-bottom:10px;">分</span>
                    </div>
                </div>
                <label>備考（交通）</label><textarea id="form-train-memo" rows="2" placeholder="他の交通手段など"></textarea>
            </div>

            <div class="section-title">備考</div>
            <div class="form-group">
                <label>参考URL 1</label><input type="url" id="form-url1" placeholder="https://..." style="margin-bottom:5px;">
                <label>参考URL 2</label><input type="url" id="form-url2" placeholder="https://..." style="margin-bottom:5px;">
                <label>備考（全体）</label><textarea id="form-memo" rows="2" placeholder="自由メモ"></textarea>
                <label>入力担当者</label><input type="text" id="form-user" placeholder="名前">
            </div>

            <div class="section-title">仕入分析</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>購入価格(万円)</label><input type="text" id="siire-price" class="comma-input only-num" placeholder="仕入価格（想定/実績）"></div>
                    <div class="flex-item"><label>購入根拠</label><select id="siire-basis"><option value="">選択</option><option value="借入額">借入額</option><option value="予想金額">予想金額</option><option value="実績値">実績値</option></select></div>
                </div>
                <div class="flex-row">
                    <div class="flex-item"><label>土地面積(㎡)</label><input type="text" id="siire-m2" placeholder="0.00" class="comma-input only-num"></div>
                    <div class="flex-item"><label>土地面積(坪)</label><input type="text" id="siire-tsubo" placeholder="0.00" class="comma-input" readonly></div>
                </div>
                <div class="siire-unit-box" style="margin-top:10px;">
                    <label style="font-size:11px; color:#52c41a;">仕入坪単価：</label>
                    <span id="val-siire-unit" style="font-size:16px; font-weight:bold; color:#135200;">- 万円</span>
                </div>
            </div>

            <button class="btn-save" onclick="submitForm()">すべてのタブを一括保存する</button>
            <button class="btn-cancel" onclick="closePanel()">キャンセル</button>
            <button class="btn-delete" id="delete-btn" onclick="deleteProperty()" style="display:none;">この区画を削除する</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      
      // ★ここに新しく発行した「全員」アクセス権のURLを貼り付けてください！
      const GAS_URL = "https://script.google.com/macros/s/AKfycbye18omDNeH9wMlQoTcoShnOhtcMIHiygzMT_A407mGMk6Fm3wuMiZlPMMgHqdxRKlB/exec";

      const FORM_MAP = {
          "form-id":"id", "form-lat":"lat", "form-lng":"lng", "form-type":"type", "form-name":"name", "form-tab-name":"tab_name",
          "form-addr1":"addr1", "form-addr2":"addr2", "form-addr3":"addr3",
          "form-d-first":"d_first", "form-p-first":"p_first", "form-d-c1":"d_c1", "form-p-c1":"p_c1", "form-d-c2":"d_c2", "form-p-c2":"p_c2", "form-d-c3":"d_c3", "form-p-c3":"p_c3",
          "form-d-s":"d_s", "form-p-s":"p_s", "form-price-memo":"price_memo", "form-is-sold":"is_sold",
          "form-t-m2":"t_m2", "form-t-tsubo":"t_tsubo", "form-b-m2":"b_m2", "form-b-tsubo":"b_tsubo",
          "form-layout":"layout", "form-sub-price":"sub_p", "form-gyosha":"gyosha", "form-shiten":"shiten",
          "form-taiyou":"taiyou", "form-media":"media", "form-intro-user":"intro_user",
          "form-kenpei":"kenpei", "form-youseki":"youseki", "form-law":"law", "form-road":"road",
          "form-train-line":"train_line", "form-train-station":"train_station", "form-train-walk":"train_walk", "form-train-memo":"train_memo",
          "form-url1":"url1", "form-url2":"url2", "form-memo":"memo", "form-user":"user",
          "siire-price":"siire_p", "siire-m2":"siire_m2", "siire-basis":"siire_basis"
      };

      const ICON_MAP = {
          "新築戸建": "https://sohken-homes.github.io/icon_new_house.png",
          "中古戸建": "https://sohken-homes.github.io/icon_used_house.png",
          "売地": "https://sohken-homes.github.io/icon_land.png",
          "自社新築": "https://sohken-homes.github.io/icon_jisha_new.png", 
          "自社中古": "https://sohken-homes.github.io/icon_jisha_used.png",
          "自社売地": "https://sohken-homes.github.io/icon_jisha_land.png",
          "新築MS": "https://sohken-homes.github.io/icon_new_ms.png",
          "中古MS": "https://sohken-homes.github.io/icon_used_ms.png",
          "査定依頼": "https://sohken-homes.github.io/icon_satei_land.png",
          "SOLD": "https://sohken-homes.github.io/sold_house.png",
          "DEFAULT": "https://googleusercontent.com/maps.google.com/0" 
      };

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
      script.async = true; document.head.appendChild(script);

      let map, sharedInfoWindow, geocoder, allData = [], currentEditingMarker = null, markersList = [];
      let currentTabs = []; let activeTabIndex = 0;
      let isDragging = false; 
      let dragLock = false; 

      async function initMap() {
        const { Map, InfoWindow } = google.maps;
        map = new Map(document.getElementById("map"), { center: { lat: 35.700, lng: 139.630 }, zoom: 14, mapId: MAP_ID, disableDoubleClickZoom: true });
        sharedInfoWindow = new InfoWindow(); geocoder = new google.maps.Geocoder();
        
        map.addListener("click", (e) => { 
            if(dragLock || isDragging) return;
            sharedInfoWindow.close(); 
            closePanel(); 
        });
        map.addListener("dblclick", (e) => addNewProperty(e.latLng.lat(), e.latLng.lng()));
        document.getElementById("editor-panel").style.setProperty("display", "none", "important");
        loadMarkers();
      }

      function parseAddress(fullAddress) {
          let address = fullAddress.replace(/^日本、/, "").replace(/^〒\d{3}-\d{4}\s*/, "");
          address = address.replace(/^.{2,3}[都道府県]/, "");
          let city = "", chome = "", banchi = "";
          const cityMatch = address.match(/^.*?[市区町村]/);
          if (cityMatch) { city = cityMatch[0]; address = address.replace(city, ""); }
          if (address.includes("丁目")) {
              const idx = address.indexOf("丁目") + 2; 
              chome = address.substring(0, idx);
              banchi = address.substring(idx).trim();
          } else {
              const numMatch = address.match(/[0-9０-９]/);
              if (numMatch) {
                  const numIdx = address.indexOf(numMatch[0]);
                  chome = address.substring(0, numIdx).trim();
                  banchi = address.substring(numIdx).trim();
              } else { chome = address; }
          }
          document.getElementById("form-addr1").value = city;
          document.getElementById("form-addr2").value = chome;
          document.getElementById("form-addr3").value = banchi;
          saveCurrentTabData();
      }

      function fetchAddress(lat, lng) {
          geocoder.geocode({ location: { lat, lng } }, (results, status) => {
              if (status === "OK" && results[0]) { parseAddress(results[0].formatted_address); }
          });
      }

      window.addNewProperty = (lat, lng) => {
        if(currentEditingMarker && !currentEditingMarker.rowIds) {
            currentEditingMarker.map = null;
            currentEditingMarker = null;
        }
        
        const img = document.createElement("img");
        img.src = ICON_MAP["DEFAULT"];
        img.style.width = "32px"; img.style.cursor = "pointer";

        const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat, lng }, map: map, gmpDraggable: true, content: img });
        currentEditingMarker = marker;
        currentTabs = [{ label: "区画1", data: { lat: lat, lng: lng, tab_name: "区画1" } }];
        activeTabIndex = 0; 

        marker.addListener('dragstart', () => { isDragging = true; dragLock = true; }); 
        marker.addListener('dragend', (e) => {
            isDragging = false; 
            const newPos = e.latLng;
            currentTabs.forEach(tab => { tab.data.lat = newPos.lat(); tab.data.lng = newPos.lng(); });
            fetchAddress(newPos.lat(), newPos.lng());
            setTimeout(() => { dragLock = false; }, 200);
        });

        fetchAddress(lat, lng);
        loadTabData(currentTabs[0].data); renderTabs();
        const panelBody = document.querySelector(".panel-body");
        if(panelBody) panelBody.scrollTop = 0;
        document.getElementById("editor-panel").style.setProperty("display", "flex", "important");
      };

      window.openEdit = (ids) => {
        const idArray = ids.split(",");
        if(currentEditingMarker && !currentEditingMarker.rowIds) currentEditingMarker.map = null;
        
        const marker = markersList.find(m => m.rowIds === ids);
        if(marker) { 
            marker.gmpDraggable = true; currentEditingMarker = marker;
            marker.addListener('dragstart', () => { isDragging = true; dragLock = true; }); 
            marker.addListener('dragend', (e) => {
                isDragging = false; 
                const newPos = e.latLng;
                currentTabs.forEach(tab => { tab.data.lat = newPos.lat(); tab.data.lng = newPos.lng(); });
                fetchAddress(newPos.lat(), newPos.lng());
                setTimeout(() => { dragLock = false; }, 200);
            });
        }
        
        currentTabs = idArray.map(id => {
            const r = allData.find(d => String(d["ID"]) === String(id));
            const data = {};
            const sheetToKey = { 
                "ID":"id", "緯度":"lat", "経度":"lng", "物件種別":"type", "物件名称":"name", "区画名":"tab_name", "市・区":"addr1", "所在（丁目まで）":"addr2", "住居表示（丁目以降）":"addr3", 
                "初回価格入力日":"d_first", "販売価格（初回入力時/万円）":"p_first", "変更日1":"d_c1", "変更価格１（万円）":"p_c1", "変更日2":"d_c2", "変更価格２（万円）":"p_c2", "変更日3":"d_c3", "変更価格３（万円）":"p_c3", "成約日":"d_s", "成約価格（万円）":"p_s", "価格推移備考":"price_memo", "成約フラグ":"is_sold", 
                "地積（㎡）":"t_m2", "地積（坪）":"t_tsubo", "床面積（㎡）":"b_m2", "床面積（坪）":"b_tsubo", "間取り":"layout", "建物価格入力用":"sub_p", 
                "登録業者名":"gyosha", "支店名":"shiten", "取引態様":"taiyou", "登録媒体":"media", "紹介担当者":"intro_user", 
                "建蔽率":"kenpei", "容積率":"youseki", "公法制限":"law", "接道":"road", 
                "路線":"train_line", "駅":"train_station", "駅からの徒歩":"train_walk", "備考（交通）":"train_memo",
                "参考URL1":"url1", "参考URL2":"url2", "メモ":"memo", "入力者":"user", 
                "購入価格":"siire_p", "仕入土地面積":"siire_m2", "購入根拠":"siire_basis" 
            };
            Object.keys(sheetToKey).forEach(s => data[sheetToKey[s]] = r[s] !== undefined ? r[s] : "");
            return { label: data.tab_name || "区画1", data: data };
        });

        activeTabIndex = 0; 
        loadTabData(currentTabs[0].data); 
        renderTabs();
        const panelBody = document.querySelector(".panel-body");
        if(panelBody) panelBody.scrollTop = 0;
        document.getElementById("editor-panel").style.setProperty("display", "flex", "important");
      };

      function renderTabs() {
        const bar = document.getElementById("tab-bar"); bar.innerHTML = "";
        currentTabs.forEach((tab, index) => {
            const el = document.createElement("div");
            el.className = `tab ${index === activeTabIndex ? 'active' : ''}`;
            el.innerText = tab.label || `区画${index + 1}`;
            el.onclick = (e) => { e.stopPropagation(); switchTab(index); };
            bar.appendChild(el);
        });
        const addBtn = document.createElement("div"); addBtn.className = "tab tab-add"; addBtn.innerText = "＋追加";
        addBtn.onclick = (e) => { e.stopPropagation(); addTab(); }; bar.appendChild(addBtn);
      }

      function switchTab(index) { saveCurrentTabData(); activeTabIndex = index; loadTabData(currentTabs[index].data); renderTabs(); }

      function addTab() {
        saveCurrentTabData();
        const baseData = JSON.parse(JSON.stringify(currentTabs[0].data));
        baseData.id = ""; baseData.tab_name = `区画${currentTabs.length + 1}`;
        ["p_first", "p_c1", "p_c2", "p_c3", "p_s", "t_m2", "t_tsubo", "b_m2", "b_tsubo", "layout", "sub_p", "is_sold"].forEach(k => baseData[k] = "");
        currentTabs.push({ label: baseData.tab_name, data: baseData });
        activeTabIndex = currentTabs.length - 1; loadTabData(baseData); renderTabs();
      }

      function saveCurrentTabData() {
        const data = currentTabs[activeTabIndex].data;
        Object.keys(FORM_MAP).forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            const key = FORM_MAP[id];
            if(el.type === 'checkbox') data[key] = el.checked;
            else data[key] = removeComma(el.value);
        });
        currentTabs[activeTabIndex].label = data.tab_name;
      }

      function loadTabData(data) {
        Object.keys(FORM_MAP).forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            const key = FORM_MAP[id];
            const val = data[key] !== undefined ? data[key] : "";
            if(el.type === 'checkbox') el.checked = !!val;
            else el.value = el.classList.contains('comma-input') ? formatNumberWithComma(val) : val;
        });
        document.getElementById("delete-btn").style.display = data.id ? "block" : "none";
        updateAutoFields();
      }

      function updateAutoFields() {
        const type = document.getElementById('form-type').value;
        const pFirst = parseFloat(removeComma(document.getElementById('form-p-first').value)) || 0;
        const subP = parseFloat(removeComma(document.getElementById('form-sub-price').value)) || 0;
        const lTsubo = parseFloat(removeComma(document.getElementById('form-t-tsubo').value)) || 0;
        const siireP = parseFloat(removeComma(document.getElementById('siire-price').value)) || 0;
        const siireM2 = parseFloat(removeComma(document.getElementById('siire-m2').value)) || 0;
        const sTsubo = Math.floor((siireM2 * 0.3025) * 100) / 100;
        document.getElementById('siire-tsubo').value = formatNumberWithComma(sTsubo.toFixed(2));
        document.getElementById('val-siire-unit').innerText = (siireP > 0 && sTsubo > 0) ? (Math.floor((siireP / sTsubo) * 10) / 10).toLocaleString() + " 万円" : "- 万円";
        document.getElementById('build-price-input').style.display = (type.includes("戸建") || type.includes("自社")) ? "block" : "none";
        if (lTsubo > 0) {
            const lp = type.includes("戸建") ? (pFirst - subP) : pFirst;
            document.getElementById('val-land').innerText = (lp / lTsubo).toLocaleString(undefined, {maximumFractionDigits: 1}) + " 万円";
        }
      }

      function formatNumberWithComma(val) {
          if (!val && val !== 0) return "";
          let raw = val.toString().replace(/,/g, "");
          if (isNaN(raw)) return val;
          const parts = raw.split(".");
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          return parts.join(".");
      }
      function removeComma(val) { return val.toString().replace(/,/g, ""); }
      function formatToFullDate(val) {
          if (!val) return ""; let input = val.toString().trim();
          if (/^\d{4}\/\d{1,2}\/\d{1,2}/.test(input)) return input;
          if (/^\d{1,2}\/\d{1,2}$/.test(input)) {
              const currentYear = new Date().getFullYear();
              const [m, d] = input.split("/");
              return `${currentYear}/${m.padStart(2, '0')}/${d.padStart(2, '0')}`;
          }
          return input;
      }

      // ★エラー通知を強化した保存処理
      window.submitForm = async () => {
        saveCurrentTabData(); 
        const btn = document.querySelector(".btn-save"); btn.innerText = "保存中..."; btn.disabled = true;
        try {
            const payload = currentTabs.map(tab => tab.data);
            const res = await fetch(GAS_URL, { 
                method: "POST", 
                body: JSON.stringify({ mode: "save_multiple", data: payload }) 
            });
            const result = await res.json();
            if(result.error) {
                throw new Error(result.error);
            }
            location.reload();
        } catch (e) { 
            alert("保存失敗: " + e.message); 
            btn.disabled = false; btn.innerText = "すべてのタブを一括保存する"; 
        }
      };

      window.executeSearch = () => {
          const address = document.getElementById("address-input").value;
          if(!address) return;
          geocoder.geocode({ address: address }, (res, status) => {
              if (status === "OK") { 
                  map.setCenter(res[0].geometry.location); 
                  map.setZoom(17);
                  addNewProperty(res[0].geometry.location.lat(), res[0].geometry.location.lng()); 
              } else { alert("住所が見つかりませんでした"); }
          });
      };

      window.deleteProperty = async () => {
          if(!confirm("この区画/タブを削除しますか？")) return;
          const btn = document.getElementById("delete-btn"); btn.innerText = "削除中..."; btn.disabled = true;
          try {
              const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({id: document.getElementById("form-id").value, mode: "delete"}) });
              const result = await res.json();
              if(result.error) throw new Error(result.error);
              location.reload();
          } catch (e) { 
              alert("削除失敗: " + e.message); 
              btn.disabled = false; 
              btn.innerText = "この区画を削除する";
          }
      };

      window.closePanel = () => {
          if(currentEditingMarker && !currentEditingMarker.rowIds) {
              currentEditingMarker.map = null;
              currentEditingMarker = null;
          }
          document.getElementById("editor-panel").style.setProperty("display", "none", "important");
      };

      // ★エラー通知を強化した読込処理
      async function loadMarkers() {
        try {
            const res = await fetch(GAS_URL, { redirect: "follow" }); 
            const result = await res.json();
            if(result.error) {
                alert("データの読み込みに失敗しました：\n" + result.error);
                return;
            }
            allData = result;
            
            const groups = {};
            allData.forEach(row => {
                if (!row["緯度"] || !row["経度"]) return;
                const key = `${Number(row["緯度"]).toFixed(6)}_${Number(row["経度"]).toFixed(6)}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(row);
            });

            markersList = Object.keys(groups).map(key => {
                const rows = groups[key];
                const first = rows[0];
                const ids = rows.map(r => r["ID"]).join(",");
                
                const img = document.createElement("img");
                
                if (rows.length > 1) {
                    const allSold = rows.every(r => r["成約フラグ"] === true || r["成約フラグ"] === "TRUE");
                    const hasJishaNew = rows.some(r => r["物件種別"] === "自社新築");
                    const hasJishaNewInfo = rows.some(r => r["物件種別"] === "自社新築(情開)");

                    if (allSold) {
                        img.src = "https://sohken-homes.github.io/icon_town-sold.png";
                    } else if (hasJishaNew) {
                        img.src = "https://sohken-homes.github.io/icon_jisha_new_town.png";
                    } else if (hasJishaNewInfo) {
                        img.src = "https://sohken-homes.github.io/icon_jisha_new_info_town.png";
                    } else {
                        img.src = "https://sohken-homes.github.io/icon_new_house_town.png";
                    }
                } else {
                    img.src = (first["成約フラグ"] === true || first["成約フラグ"] === "TRUE") ? ICON_MAP["SOLD"] : (ICON_MAP[first["物件種別"]] || ICON_MAP["DEFAULT"]);
                }
                img.style.width = "32px"; img.style.cursor = "pointer";
                
                const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat: Number(first["緯度"]), lng: Number(first["経度"]) }, map: map, content: img });
                marker.rowIds = ids;
                
                img.addEventListener("click", (e) => {
                    e.stopPropagation(); 
                    const fmt = (v) => v ? Number(v).toLocaleString() : "-";
                    let content = `<div style="min-width:200px; padding:10px;"><strong>${first["物件名称"] || "未設定"}</strong><br>`;
                    if(rows.length > 1) content += `<span style="color:#1a73e8; font-size:11px;">※多棟現場 (${rows.length}棟/区画)</span><br>`;
                    content += `<button onclick="openEdit('${marker.rowIds}')" style="margin-top:10px; width:100%;">編集</button></div>`;
                    sharedInfoWindow.setContent(content);
                    sharedInfoWindow.open(map, marker);
                });
                img.addEventListener("dblclick", (e) => { 
                    e.stopPropagation(); 
                    openEdit(marker.rowIds); 
                });
                
                return marker;
            });
            new markerClusterer.MarkerClusterer({ map, markers: markersList });
        } catch (e) {
            console.error("CORSや通信エラー:", e);
            alert("通信エラーが発生しました。GASの「新しいデプロイ」で「全員」権限が設定されているか、URLが正しく貼り付けられているか確認してください。");
        }
      }

      window.addEventListener('load', () => {
        const container = document.getElementById("form-container");
        
        container.addEventListener('input', (e) => {
            if (e.target.classList.contains('only-num')) {
                e.target.value = e.target.value.replace(/[^0-9\.\,]/g, '');
            }
        });

        container.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                const inputs = Array.from(container.querySelectorAll('input, select, button'));
                const index = inputs.indexOf(e.target);
                if (index > -1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            }
        });

        container.addEventListener('blur', (e) => {
            if(e.target.classList.contains('comma-input')) { e.target.value = formatNumberWithComma(e.target.value); updateAutoFields(); }
            if(e.target.classList.contains('date-input')) e.target.value = formatToFullDate(e.target.value);
        }, true);
        container.addEventListener('focus', (e) => {
            if(e.target.classList.contains('comma-input')) e.target.value = removeComma(e.target.value);
        }, true);
        document.getElementById('form-type').addEventListener('change', updateAutoFields);
        
        const syncArea = (m2Id, tsuboId) => {
            const el = document.getElementById(m2Id);
            if(el) { el.addEventListener('blur', (e) => {
                const v = removeComma(e.target.value);
                if(v) document.getElementById(tsuboId).value = (Math.floor((v * 0.3025) * 100) / 100).toFixed(2);
            });}
        };
        syncArea('form-t-m2', 'form-t-tsubo'); syncArea('form-b-m2', 'form-b-tsubo'); syncArea('siire-m2', 'siire-tsubo');

        const autoCheckSold = () => {
            const ds = document.getElementById('form-d-s').value.trim();
            const ps = document.getElementById('form-p-s').value.trim();
            if (ds !== "" || ps !== "") {
                document.getElementById('form-is-sold').checked = true;
            }
        };
        document.getElementById('form-d-s').addEventListener('blur', autoCheckSold);
        document.getElementById('form-p-s').addEventListener('blur', autoCheckSold);
        document.getElementById('form-p-s').addEventListener('input', autoCheckSold);
      });
    </script>
</body>
</html>
