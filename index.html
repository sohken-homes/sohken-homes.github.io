<!DOCTYPE html>
<html lang="ja">
<head>
    <title>不動産管理マップ v5.0.23</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        
        /* ログイン画面用スタイル */
        #login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: #f0f2f5; position: fixed; top: 0; left: 0; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #1a73e8; margin-top: 0; margin-bottom: 30px; font-size: 20px;}
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #5f6368; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        .input-group input:focus { border-color: #1a73e8; }
        .btn-login { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-login:hover { background: #1557b0; }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; }
        #login-error-msg { color: #d93025; font-size: 13px; margin-top: 15px; font-weight: bold; display: none; }

        /* マップ画面用スタイル */
        #main-app { display: none; height: 100%; width: 100%; position: relative; }
        #map { height: 100vh; width: 100%; }
        
        #search-box-container { position: absolute; top: 70px; left: 10px; z-index: 5; display: flex; gap: 5px; align-items: center; }
        #address-input { width: 180px; padding: 10px 15px; border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 14px; outline: none; }
        #search-btn { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer; font-size: 14px; font-weight: bold; }
        
        #filter-panel { position: absolute; top: 125px; left: 10px; z-index: 5; background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 6px; font-size: 13px; width: 170px; }
        .filter-item { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #333; }
        .filter-item input { cursor: pointer; }

        .side-panel { display: none !important; position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 0; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 440px; max-height: 95vh; overflow: hidden; flex-direction: column; }
        
        .panel-header { padding: 12px 15px 6px 15px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { margin: 0; font-size: 15px; color: #1a73e8; white-space: nowrap; }
        .header-actions { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }
        .btn-action { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .btn-action:hover { background: #e8f0fe; }
        .btn-att-off { background: #f1f3f4; color: #5f6368; border: 1px solid #ccc; }
        .btn-att-on { background: #e8f0fe; color: #1a73e8; border: 2px solid #1a73e8; box-shadow: 0 0 5px rgba(26,115,232,0.4); }
        .btn-switch-edit { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .btn-switch-edit:hover { background: #e8f0fe; }
        .btn-close-view { background: #f1f3f4; border: none; color: #5f6368; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-left: 2px; font-weight: bold; }
        
        .tab-container { display: flex; gap: 2px; padding: 0 10px; border-bottom: 1px solid #ddd; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab { padding: 6px 12px; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 6px 6px 0 0; font-size: 12px; color: #5f6368; white-space: nowrap; margin-top: 5px; }
        .tab.active { font-weight: bold; position: relative; top: 1px; color: #1a73e8; }
        .tab-add { color: #188038; font-weight: bold; background: #e6f4ea; border-radius: 6px; margin-bottom: 5px;}

        .panel-body { padding: 15px 20px; overflow-y: auto; flex: 1; scroll-behavior: smooth; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        
        #view-panel { background: white; }
        #view-panel .tab-container { background: #f1f3f4; }
        #view-panel .tab.active { background: white; border-color: #ddd; }
        #view-panel .panel-body { background: white; }
        
        .view-price-box { background: #fffbe6; border: 1px solid #ffe58f; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .view-latest-price { font-size: 28px; font-weight: bold; color: #cf1322; margin: 0; line-height: 1; }
        .view-price-history { font-size: 13px; color: #666; margin-top: 8px; font-weight: bold; line-height: 1.5; }
        .view-unit-price { font-size: 13px; color: #d46b08; margin-top: 8px; background: #fff1b8; display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; margin-bottom: 10px; }
        .view-item { background: #f8f9fa; padding: 8px 10px; border-radius: 6px; border: 1px solid #e8eaed; }
        .view-item span { display: block; font-size: 10px; color: #80868b; margin-bottom: 2px; }
        .view-item div { color: #202124; font-weight: bold; word-break: break-all; }
        .view-item.full-width { grid-column: span 2; }
        .view-item.sold-box { background: #fff1f0; border-color: #ffa39e; }

        #editor-panel { background: #e3f2fd; } 
        #editor-panel .tab-container { background: #bbdefb; border-bottom: 1px solid #90caf9; }
        #editor-panel .tab.active { background: #ffffff; border-color: #90caf9; color: #1565c0; }
        #editor-panel .panel-body { background: #ffffff; }
        #editor-panel .section-title { background: #bbdefb; color: #1565c0; }
        
        .drag-notice { font-size: 10px; color: #e67e22; margin-top: 4px; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: white; }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        .flex-item { flex: 1; }
        .unit-label { font-size: 12px; color: #888; white-space: nowrap; width: 25px; }
        .sold-inline { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #cf1322; font-weight: bold; white-space: nowrap; flex-shrink: 0; }
        .sold-inline input { width: 18px !important; height: 18px !important; margin: 0; cursor: pointer; }
        
        #unit-price-container { background: #fffbe6; padding: 12px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; }
        .price-display { font-size: 16px; font-weight: bold; color: #d93025; }
        .siire-unit-box { background: #f6ffed; border: 1px solid #b7eb8f; padding: 10px; border-radius: 8px; text-align: center; }
        .btn-save { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-delete { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        input[readonly] { background-color: #f9f9f9; color: #555; }
        
        #file-manager { border: 2px dashed #b7eb8f; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 12px; background: #f6ffed; }
        #file-manager.dragover { background: #e8f0fe; border-color: #1a73e8; }
        .file-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 6px 0; }
        .file-item a { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1a73e8; text-decoration: none; font-size: 12px; }
        .file-item a:hover { text-decoration: underline; }
        .file-actions button { font-size: 10px; padding: 2px 6px; margin-left: 4px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white; }
        .file-actions button.del { color: #cf1322; border-color: #ffa39e; }

        .active-marker { outline: 5px solid #e53935; outline-offset: 3px; border-radius: 50%; box-shadow: 0 0 20px rgba(229, 57, 53, 0.9); animation: pulse 1s infinite; background-color: rgba(255, 255, 255, 0.8); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.8); }
            70% { box-shadow: 0 0 0 20px rgba(229, 57, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0); }
        }

        .attention-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 42px; height: 42px; border: 3px solid rgba(0, 123, 255, 0.8); border-radius: 50%; pointer-events: none; }
        
        #saving-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.7); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            font-size: 20px; font-weight: bold; color: #1a73e8; cursor: wait;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>創建ホームズ不動産管理マップ</h2>
            <div class="input-group">
                <label>入力者名</label>
                <input type="text" id="user-name" placeholder="名前を入力">
            </div>
            <div class="input-group">
                <label>共通パスワード</label>
                <input type="password" id="user-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <button class="btn-login" id="login-btn" onclick="doLogin()">システムにログイン</button>
            <div id="login-error-msg"></div>
        </div>
    </div>

    <div id="main-app">
        <div id="saving-overlay">
            <div>⏳ 処理中です。しばらくお待ちください...</div>
            <div style="font-size:12px; color:#666; margin-top:10px; font-weight:normal;">※このまま画面を閉じないでください</div>
        </div>

        <div id="search-box-container">
            <input type="text" id="address-input" placeholder="住所で新規登録" onkeydown="if(event.key==='Enter')executeSearch()">
            <button id="search-btn" onclick="executeSearch()">検索</button>
        </div>

        <div id="filter-panel">
            <div style="color:#1a73e8; font-weight:bold; margin-bottom:4px; font-size:12px;">■ 表示レイヤ</div>
            <label class="filter-item" style="font-weight:bold; border-bottom:1px solid #ccc; padding-bottom:6px; margin-bottom:4px;">
                <input type="checkbox" id="layer-all" checked> 全て表示
            </label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="新築戸建" checked> 新築戸建</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="中古戸建" checked> 中古戸建</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="売地" checked> 売地</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="自社物件" checked> 自社物件</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="自社（情開）" checked> 自社（情開）</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="MS" checked> マンション (全)</label>
            <label class="filter-item"><input type="checkbox" class="layer-cb" value="査定" checked> 査定依頼</label>
            <hr style="width:100%; margin:4px 0; border:none; border-top:1px solid #ddd;">
            <label class="filter-item" style="color:#007bff; font-weight:bold; margin-top:2px;">
                <input type="checkbox" id="layer-sold"> 成約物件も表示
            </label>
            <label class="filter-item" style="color:#007bff; font-weight:bold; margin-top:2px;">
                <input type="checkbox" id="layer-att"> 注目物件のみ表示
            </label>
            
            <div style="font-weight:bold; color:#1a73e8; margin:8px 0 2px; font-size:11px;">■ 日付・担当者 絞り込み</div>
            <div style="background:#f8f9fa; padding:8px; border-radius:6px; border:1px solid #ddd;">
                <select id="filter-date-type" style="width:100%; padding:4px; font-size:12px; border-radius:4px; border:1px solid #ccc; margin-bottom:4px; cursor:pointer;">
                    <option value="更新日">更新日</option>
                    <option value="入力日">入力日</option>
                    <option value="成約日">成約日</option>
                </select>
                <div style="display:flex; align-items:center; gap:4px; margin-bottom:4px;">
                    <input type="text" id="filter-date-start" class="date-input filter-date" placeholder="年/月/日" style="width:100%; padding:4px; font-size:11px; border-radius:4px; border:1px solid #ccc; text-align:center;">
                    <span style="font-size:10px;">〜</span>
                </div>
                <div style="display:flex; align-items:center; gap:4px; margin-bottom:6px;">
                    <input type="text" id="filter-date-end" class="date-input filter-date" placeholder="年/月/日" style="width:100%; padding:4px; font-size:11px; border-radius:4px; border:1px solid #ccc; text-align:center;">
                    <button id="clear-date-btn" style="font-size:10px; padding:2px 4px; cursor:pointer; background:#fff; border:1px solid #ccc; border-radius:4px;">クリア</button>
                </div>
                <div style="font-size:10px; color:#555; margin-bottom:2px;">入力者:</div>
                <select id="filter-user" style="width:100%; padding:4px; font-size:12px; border-radius:4px; border:1px solid #ccc; cursor:pointer;">
                    <option value="">全ての入力者</option>
                </select>
            </div>
        </div>

        <div id="view-panel" class="side-panel">
            <div class="panel-header">
                <h3>🏠 物件詳細</h3>
                <div class="header-actions">
                    <button id="view-att-btn" class="btn-action" onclick="toggleAttention()">★ 注目</button>
                    <button class="btn-action" onclick="touchUpdate()">本日チェック/更新済</button>
                    <button class="btn-switch-edit" onclick="switchToEdit()">✏️ 編集</button>
                    <button class="btn-close-view" onclick="closePanel()">✖</button>
                </div>
            </div>
            <div class="tab-container" id="view-tab-bar"></div>
            <div class="panel-body" id="view-container"></div>
        </div>

        <div id="editor-panel" class="side-panel">
            <div style="display:block;">
                <div class="panel-header">
                    <h3>✏️ 物件登録・編集</h3>
                    <div class="header-actions">
                        <button id="edit-att-btn" class="btn-action" onclick="toggleAttention()">★ 注目</button>
                        <button class="btn-action" onclick="submitForm()">本日チェック/更新済</button>
                        <button class="btn-switch-edit" onclick="switchToView()" style="color:#1565c0; border-color:#1565c0;">👁️ 閲覧</button>
                        <button class="btn-close-view" onclick="closePanel()">✖</button>
                    </div>
                </div>
                <div class="drag-notice" style="padding: 0 15px 5px 15px; margin: 0;">※編集中のマーカーは地図上でドラッグ移動できます</div>
            </div>
            <div class="tab-container" id="tab-bar"></div>
            <div class="panel-body" id="form-container">
                <input type="hidden" id="form-id">
                <input type="hidden" id="form-lat">
                <input type="hidden" id="form-lng">
                <input type="checkbox" id="form-is-att" style="display:none;">

                <div class="section-title">基本情報</div>
                <div class="form-group">
                    <div class="flex-row">
                        <div class="flex-item">
                            <label>物件種別</label>
                            <select id="form-type">
                                <option value="">選択</option>
                                <optgroup label="他社分譲"><option value="新築戸建">新築戸建</option><option value="中古戸建">中古戸建</option><option value="売地">売地</option></optgroup>
                                <optgroup label="自社分譲"><option value="自社新築">自社新築</option><option value="自社中古">自社中古</option><option value="自社売地">自社売地</option><option value="自社新築(情開)">自社新築(情開)</option><option value="自社中古(情開)">自社中古(情開)</option><option value="自社売地(情開)">自社売地(情開)</option><option value="自社中古MS(情開)">自社中古MS(情開)</option></optgroup>
                                <optgroup label="マンション・その他"><option value="新築MS">新築MS</option><option value="中古MS">中古MS</option><option value="査定依頼">査定依頼</option><option value="査定依頼MS">査定依頼MS</option></optgroup>
                            </select>
                        </div>
                        <div class="flex-item"><label>区画番号</label><input type="text" id="form-tab-name" placeholder="例：1号棟"></div>
                    </div>
                </div>
                <div class="form-group"><label>物件名称/売主業者の場合の業者名</label><input type="text" id="form-name" placeholder="例：㈱〇〇・〇〇シリーズ荻窪など"></div>
                <div class="form-group">
                    <label>住所</label>
                    <div class="flex-row">
                        <div class="flex-item"><input type="text" id="form-addr1" placeholder="市区"></div>
                        <div class="flex-item"><input type="text" id="form-addr2" placeholder="町名"></div>
                        <div class="flex-item"><input type="text" id="form-addr3" placeholder="以降"></div>
                    </div>
                </div>

                <div class="section-title">価格推移 (単位: 万円)</div>
                <div class="form-group">
                    <div class="flex-row" style="margin-bottom:8px;">
                        <div class="flex-item"><label>初回入力日</label><input type="text" id="form-d-first" placeholder="年/月/日" class="date-input"></div>
                        <div class="flex-item"><label>初回価格</label><input type="text" id="form-p-first" placeholder="初回価格" class="comma-input only-num"></div>
                    </div>
                    <div class="flex-row" style="margin-bottom:8px;">
                        <div class="flex-item"><label>変更日1</label><input type="text" id="form-d-c1" placeholder="年/月/日" class="date-input"></div>
                        <div class="flex-item"><label>価格1</label><input type="text" id="form-p-c1" placeholder="変更価格1" class="comma-input only-num"></div>
                    </div>
                    <div class="flex-row" style="margin-bottom:8px;">
                        <div class="flex-item"><label>変更日2</label><input type="text" id="form-d-c2" placeholder="年/月/日" class="date-input"></div>
                        <div class="flex-item"><label>価格2</label><input type="text" id="form-p-c2" placeholder="変更価格2" class="comma-input only-num"></div>
                    </div>
                    <div class="flex-row" style="margin-bottom:8px;">
                        <div class="flex-item"><label>変更日3</label><input type="text" id="form-d-c3" placeholder="年/月/日" class="date-input"></div>
                        <div class="flex-item"><label>価格3</label><input type="text" id="form-p-c3" placeholder="変更価格3" class="comma-input only-num"></div>
                    </div>
                    <div class="flex-row" style="justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label style="margin:0;">成約日 / 価格</label>
                        <div class="sold-inline"><input type="checkbox" id="form-is-sold"> 成約済</div>
                    </div>
                    <div class="flex-row" style="margin-bottom:8px;">
                        <div class="flex-item"><input type="text" id="form-d-s" placeholder="年/月/日" class="date-input"></div>
                        <div class="flex-item"><input type="text" id="form-p-s" placeholder="成約価格" class="comma-input only-num"></div>
                    </div>
                    <label>備考（価格）</label><textarea id="form-price-memo" rows="2" placeholder="理由や履歴など"></textarea>
                </div>

                <div class="section-title">面積詳細</div>
                <div class="form-group">
                    <label>土地面積 (㎡ / 坪)</label>
                    <div class="flex-row">
                        <input type="text" id="form-t-m2" placeholder="0.00" class="comma-input area-input only-num flex-item"><span class="unit-label">㎡</span>
                        <input type="text" id="form-t-tsubo" placeholder="0.00" class="comma-input area-input flex-item" readonly><span class="unit-label">坪</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>建物面積 (㎡ / 坪)</label>
                    <div class="flex-row" style="margin-bottom:5px;">
                        <input type="text" id="form-b-m2" placeholder="0.00" class="comma-input area-input only-num flex-item"><span class="unit-label">㎡</span>
                        <input type="text" id="form-b-tsubo" placeholder="0.00" class="comma-input area-input flex-item" readonly><span class="unit-label">坪</span>
                    </div>
                    <label>敷地条件・間取り</label><input type="text" id="form-layout" placeholder="敷地延長、4LDKなど">
                </div>

                <div class="section-title">単価計算（自動反映）</div>
                <div id="unit-price-container">
                    <div id="build-price-input" style="display:none; margin-bottom:10px;">
                        <label style="font-size:10px; color:#c41d7f;">想定建物価格(万円)</label>
                        <input type="text" id="form-sub-price" class="comma-input only-num" placeholder="未入力で「入力待ち」表示">
                    </div>

    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      const GAS_URL = "https://script.google.com/macros/s/AKfycbzESTbAZ8Wh3FDr-jTQbgKw0cEoi9Gp452EKLNBkogLDx7eWoMWyc26GPeBtSN-m5KW/exec";
      
      const getUser = () => sessionStorage.getItem("mapUserName") || "";
      const getPass = () => sessionStorage.getItem("mapPassword") || "";

      function forceLogout() {
          sessionStorage.removeItem("mapAuthStatus");
          sessionStorage.removeItem("mapUserName");
          sessionStorage.removeItem("mapPassword");
          document.getElementById('main-app').style.display = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          const errorMsg = document.getElementById("login-error-msg");
          errorMsg.innerText = "パスワードが変更されたか、セッションが無効です。再度ログインしてください。";
          errorMsg.style.display = "block";
      }

      async function doLogin() {
          const nameInput = document.getElementById("user-name").value.trim();
          const passInput = document.getElementById("user-pass").value.trim();
          const errorMsg = document.getElementById("login-error-msg");
          const btn = document.getElementById("login-btn");
          errorMsg.style.display = "none";
          if (!nameInput || !passInput) {
              errorMsg.innerText = "名前とパスワードを両方入力してください。";
              errorMsg.style.display = "block"; return;
          }
          btn.disabled = true; btn.innerText = "認証中...";

          try {
              const res = await fetch(GAS_URL, {
                  method: "POST",
                  headers: { "Content-Type": "text/plain" },
                  body: JSON.stringify({ mode: "login", reqUser: nameInput, password: passInput })
              });
              const result = await res.json();

              if (result.success) {
                  sessionStorage.setItem("mapAuthStatus", "authorized");
                  sessionStorage.setItem("mapUserName", nameInput);
                  sessionStorage.setItem("mapPassword", passInput); 
                  showAppScreen();
              } else { throw new Error(result.error); }
          } catch (e) {
              errorMsg.innerText = e.message || "通信エラーが発生しました。";
              errorMsg.style.display = "block";
              btn.disabled = false; btn.innerText = "システムにログイン";
          }
      }

      function showAppScreen() {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('main-app').style.display = 'block';
          if (typeof google === 'object' && typeof google.maps === 'object') {
              fetchMapData();
          } else {
              const script = document.createElement('script');
              script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
              script.async = true; document.head.appendChild(script);
          }
      }

      window.addEventListener('load', () => {
          if (sessionStorage.getItem("mapAuthStatus") === "authorized") showAppScreen();
      });

      const FORM_MAP = {
          "form-id":"id", "form-lat":"lat", "form-lng":"lng", "form-type":"type", "form-name":"name", "form-tab-name":"tab_name",
          "form-addr1":"addr1", "form-addr2":"addr2", "form-addr3":"addr3",
          "form-d-first":"d_first", "form-p-first":"p_first", "form-d-c1":"d_c1", "form-p-c1":"p_c1", "form-d-c2":"d_c2", "form-p-c2":"p_c2", "form-d-c3":"d_c3", "form-p-c3":"p_c3",
          "form-d-s":"d_s", "form-p-s":"p_s", "form-price-memo":"price_memo", "form-is-sold":"is_sold",
          "form-t-m2":"t_m2", "form-t-tsubo":"t_tsubo", "form-b-m2":"b_m2", "form-b-tsubo":"b_tsubo",
          "form-layout":"layout", "form-sub-price":"sub_p", "form-gyosha":"gyosha", "form-shiten":"shiten",
          "form-taiyou":"taiyou", "form-media":"media", "form-intro-user":"intro_user",
          "form-kenpei":"kenpei", "form-youseki":"youseki", "form-law":"law", "form-road":"road",
          "form-train-line":"train_line", "form-train-station":"train_station", "form-train-walk":"train_walk", "form-train-memo":"train_memo",
          "form-url1":"url1", "form-url2":"url2", "form-memo":"memo", "form-user":"user",
          "siire-price":"siire_p", "siire-m2":"siire_m2", "siire-tsubo":"siire_tsubo", "siire-unit-val":"siire_unit", "siire-basis":"siire_basis",
          "form-is-att":"is_att"
      };

      const ICON_MAP = {
          "新築戸建": "https://sohken-homes.github.io/icon_new_house.png", "中古戸建": "https://sohken-homes.github.io/icon_used_house.png",
          "売地": "https://sohken-homes.github.io/icon_land.png", "自社新築": "https://sohken-homes.github.io/icon_jisha_new.png", 
          "自社中古": "https://sohken-homes.github.io/icon_jisha_used.png", "自社売地": "https://sohken-homes.github.io/icon_jisha_land.png",
          "自社新築(情開)": "https://sohken-homes.github.io/icon_jisha_new_info.png", "自社中古(情開)": "https://sohken-homes.github.io/icon_jisha_used_info.png",
          "自社売地(情開)": "https://sohken-homes.github.io/icon_jisha_land_info.png", "自社中古MS(情開)": "https://sohken-homes.github.io/icon_jisha_ms_info.png",
          "新築MS": "https://sohken-homes.github.io/icon_new_ms.png", "中古MS": "https://sohken-homes.github.io/icon_used_ms.png",
          "査定依頼": "https://sohken-homes.github.io/icon_satei_land.png", "査定依頼MS": "https://sohken-homes.github.io/icon_satei_ms.png",
          "DEFAULT": "https://maps.google.com/mapfiles/ms/icons/red-dot.png" 
      };

      let map, geocoder, allData = [], currentEditingMarker = null, markersList = [];
      let currentTabs = []; let activeTabIndex = 0;
      let isDragging = false; let dragLock = false; let clusterer = null; 
      let isSaving = false;

      function generateUUID() {
          if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
          return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
              var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8); return v.toString(16);
          });
      }

      async function initMap() {
        const { Map } = google.maps;
        map = new Map(document.getElementById("map"), { 
            center: { lat: 35.700, lng: 139.630 }, zoom: 14, mapId: MAP_ID, 
            disableDoubleClickZoom: true, mapTypeControl: true,
            mapTypeControlOptions: { position: google.maps.ControlPosition.TOP_LEFT },
            streetViewControl: true, streetViewControlOptions: { position: google.maps.ControlPosition.TOP_LEFT }
        });
        geocoder = new google.maps.Geocoder();
        
        map.addListener("click", (e) => { 
            if(dragLock || isDragging || isSaving) return;
            closePanel(); 
        });
        map.addListener("dblclick", (e) => {
            if(isSaving) return;
            addNewProperty(e.latLng.lat(), e.latLng.lng());
        });
        
        map.getStreetView().addListener("visible_changed", () => {
            const isSV = map.getStreetView().getVisible();
            document.getElementById("search-box-container").style.display = isSV ? "none" : "flex";
            document.getElementById("filter-panel").style.display = isSV ? "none" : "flex";
            if (isSV && !isSaving) closePanel();
        });

        const offset = setInterval(() => {
            const mtc = document.querySelector('.gm-style-mtc');
            const pegman = document.querySelector('.gm-svpc');
            if (mtc && pegman) {
                const mtcRoot = mtc.closest('.gmnoprint').parentElement;
                const pegmanRoot = pegman.closest('.gmnoprint');
                if (mtcRoot && pegmanRoot && mtcRoot.parentElement === pegmanRoot.parentElement) {
                    mtcRoot.parentElement.appendChild(pegmanRoot);
                    mtcRoot.parentElement.style.left = "10px";
                    mtcRoot.parentElement.style.top = "10px";
                    clearInterval(offset);
                }
            }
        }, 500);

        fetchMapData();
      }

      function highlightMarker(marker) {
          if (currentEditingMarker && currentEditingMarker.content) currentEditingMarker.content.classList.remove('active-marker');
          currentEditingMarker = marker;
          if (marker && marker.content) marker.content.classList.add('active-marker');
          // ▼ 選択状態が変わったためクラスターの見た目も即座に再計算して更新する
          if (clusterer) clusterer.render(); 
      }

      function parseAddress(fullAddress) {
          let address = fullAddress.replace(/^日本、/, "").replace(/^〒\d{3}-\d{4}\s*/, "").replace(/^.{2,3}[都道府県]/, "");
          let city = "", chome = "", banchi = "";
          const cityMatch = address.match(/^.*?[市区町村]/);
          if (cityMatch) { city = cityMatch[0]; address = address.replace(cityMatch[0], "").trim(); }
          
          if (address.includes("丁目")) {
              const idx = address.indexOf("丁目") + 2; 
              chome = address.substring(0, idx);
              banchi = address.substring(idx).trim().replace(/^[ー－\-－\s]+/, "");
          } else {
              const numMatch = address.match(/[0-9０-９]/);
              if (numMatch) {
                  const numIdx = address.indexOf(numMatch[0]);
                  chome = address.substring(0, numIdx).trim();
                  banchi = address.substring(numIdx).trim();
              } else { chome = address; }
          }
          document.getElementById("form-addr1").value = city;
          document.getElementById("form-addr2").value = chome;
          document.getElementById("form-addr3").value = banchi;
          saveCurrentTabData();
      }

      function fetchAddress(lat, lng) {
          geocoder.geocode({ location: { lat, lng } }, (results, status) => {
              if (status === "OK" && results[0]) parseAddress(results[0].formatted_address);
          });
      }

      window.addNewProperty = (lat, lng) => {
        closePanel();
        const img = document.createElement("img"); img.src = ICON_MAP["DEFAULT"]; img.style.width = "32px"; img.style.cursor = "pointer";
        const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat, lng }, map: map, gmpDraggable: true, content: img });
        highlightMarker(marker);
        
        const newId = generateUUID(); 
        currentTabs = [{ label: "区画1", data: { id: newId, lat: lat, lng: lng, tab_name: "区画1", user: getUser(), is_att: false } }];
        activeTabIndex = 0; 
        
        marker.hasDragListener = true;
        marker.addListener('dragstart', () => { isDragging = true; dragLock = true; }); 
        marker.addListener('dragend', async (e) => {
            const newLat = e.latLng.lat(), newLng = e.latLng.lng();
            currentTabs.forEach(tab => { tab.data.lat = newLat; tab.data.lng = newLng; });
            document.getElementById("form-lat").value = newLat;
            document.getElementById("form-lng").value = newLng;
            fetchAddress(newLat, newLng);
            
            const updateData = currentTabs.filter(t => t.data.id).map(t => ({ id: t.data.id, lat: newLat, lng: newLng }));
            if (updateData.length > 0) {
                try { await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ mode: "update_coords", reqUser: getUser(), password: getPass(), data: updateData }) }); } catch(err) {}
            }
            setTimeout(() => { isDragging = false; dragLock = false; }, 300);
        });
        
        fetchAddress(lat, lng);
        loadTabData(currentTabs[0].data); renderTabs();
        
        document.getElementById("editor-panel").style.setProperty("display", "flex", "important");
        document.getElementById("form-container").scrollTop = 0; 
        refreshFileList(); 
        updateAttButtonUI(false);
      };

      function prepareDataForIds(ids) {
          const idArray = ids.split(",");
          currentTabs = idArray.map(id => {
              const r = allData.find(d => String(d["ID"]) === String(id));
              const data = {};
              const sheetToKey = {
                  "ID":"id", "緯度":"lat", "経度":"lng", "物件種別":"type", "物件名称":"name", "区画名":"tab_name", "市・区":"addr1", "所在（丁目まで）":"addr2", "住居表示（丁目以降）":"addr3",
                  "初回価格入力日":"d_first", "販売価格（初回入力時/万円）":"p_first", "変更日1":"d_c1", "変更価格１（万円）":"p_c1", "変更日2":"d_c2", "変更価格２（万円）":"p_c2", "変更日3":"d_c3", "変更価格３（万円）":"p_c3", "成約日":"d_s", "成約価格（万円）":"p_s", "価格推移備考":"price_memo", "成約フラグ":"is_sold",
                  "地積（㎡）":"t_m2", "地積（坪）":"t_tsubo", "床面積（㎡）":"b_m2", "床面積（坪）":"b_tsubo", "敷地条件・間取り":"layout", "建物価格入力用":"sub_p",
                  "登録業者名":"gyosha", "支店名":"shiten", "取引態様":"taiyou", "登録媒体":"media", "紹介担当者":"intro_user",
                  "建蔽率":"kenpei", "容積率":"youseki", "公法制限":"law", "接道":"road",
                  "路線":"train_line", "駅":"train_station", "駅からの徒歩":"train_walk", "備考（交通）":"train_memo",
                  "参考URL1":"url1", "参考URL2":"url2", "メモ":"memo", "入力者":"user",
                  "購入価格":"siire_p", "仕入坪単価":"siire_unit", "仕入土地面積（㎡）":"siire_m2", "仕入土地面積（坪）":"siire_tsubo", "購入根拠":"siire_basis",
                  "ドライブURL":"drive_url", "マップURL":"map_url", "注目継続":"is_att"
              };
              Object.keys(sheetToKey).forEach(s => { if (r[s] !== undefined) data[sheetToKey[s]] = r[s]; });
              data.is_att = (data.is_att === true || data.is_att === "TRUE");
              return { label: data.tab_name || "区画1", data: data };
          });
      }

      window.openView = (ids, marker) => {
          closePanel();
          if(marker) highlightMarker(marker);
          prepareDataForIds(ids);
          activeTabIndex = 0;
          renderViewTabs();
          loadViewData(currentTabs[0].data);
          
          document.getElementById("view-panel").style.setProperty("display", "flex", "important");
          document.getElementById("view-container").scrollTop = 0;
          updateAttButtonUI(currentTabs[0].data.is_att);
      };

      window.switchToEdit = () => {
          document.getElementById("view-panel").style.setProperty("display", "none", "important");
          if(currentEditingMarker && !currentEditingMarker.hasDragListener) {
              currentEditingMarker.gmpDraggable = true;
              currentEditingMarker.hasDragListener = true;
              currentEditingMarker.addListener('dragstart', () => { isDragging = true; dragLock = true; }); 
              currentEditingMarker.addListener('dragend', async (e) => {
                  const newLat = e.latLng.lat(), newLng = e.latLng.lng();
                  currentTabs.forEach(tab => { tab.data.lat = newLat; tab.data.lng = newLng; });
                  document.getElementById("form-lat").value = newLat;
                  document.getElementById("form-lng").value = newLng;
                  fetchAddress(newLat, newLng);
                  
                  const updateData = currentTabs.filter(t => t.data.id).map(t => ({ id: t.data.id, lat: newLat, lng: newLng }));
                  if (updateData.length > 0) {
                      try { await fetch(GAS_URL, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify({ mode: "update_coords", reqUser: getUser(), password: getPass(), data: updateData }) }); } catch(err) {}

                  setTimeout(() => { isDragging = false; dragLock = false; }, 300);
              });
          }
          loadTabData(currentTabs[activeTabIndex].data); 
          renderTabs();
          
          document.getElementById("editor-panel").style.setProperty("display", "flex", "important");
          document.getElementById("form-container").scrollTop = 0;
          refreshFileList();
          updateAttButtonUI(currentTabs[activeTabIndex].data.is_att);
      };

      window.closePanel = () => { 
          if(isSaving) return;
          if(currentEditingMarker) {
              if(!currentEditingMarker.rowIds) currentEditingMarker.map = null; 
              else if(currentEditingMarker.content) currentEditingMarker.content.classList.remove('active-marker');
              currentEditingMarker.gmpDraggable = false;
          }
          currentEditingMarker = null; 
          // ▼ パネルを閉じたときもクラスターの赤いパルスを消すために再計算
          if (clusterer) clusterer.render(); 
          document.getElementById("editor-panel").style.setProperty("display", "none", "important"); 
          document.getElementById("view-panel").style.setProperty("display", "none", "important"); 
      };

      window.toggleAttention = () => {
          if (!currentTabs[activeTabIndex] || !currentTabs[activeTabIndex].data) return;
          const newState = !currentTabs[activeTabIndex].data.is_att;
          
          currentTabs.forEach(tab => { tab.data.is_att = newState; });
          
          document.getElementById('form-is-att').checked = newState;
          updateAttButtonUI(newState);
          touchUpdate(true);
      };

      function updateAttButtonUI(isAtt) {
          const btns = [document.getElementById('view-att-btn'), document.getElementById('edit-att-btn')];
          btns.forEach(btn => {
              if(btn) {
                  if(isAtt) { btn.className = "btn-action btn-att-on"; btn.innerText = "★ 注目ON"; }
                  else { btn.className = "btn-action btn-att-off"; btn.innerText = "★ 注目OFF"; }
              }
          });
      }

      window.touchUpdate = async (silent = false) => {
          const updateData = currentTabs
              .filter(t => t.data.id) 
              .map(t => { return { id: t.data.id, is_att: t.data.is_att }; });
              
          if(updateData.length === 0) return; 

          const activeId = currentTabs[activeTabIndex]?.data?.id;
          const activeLat = currentTabs[activeTabIndex]?.data?.lat;
          const activeLng = currentTabs[activeTabIndex]?.data?.lng;

          document.getElementById("saving-overlay").style.display = "flex";
          try {
              await fetch(GAS_URL, { 
                  method:"POST", headers: { "Content-Type": "text/plain" },
                  body: JSON.stringify({ mode: "touch_update", reqUser: getUser(), password: getPass(), data: updateData }) 
              });
              await fetchMapData();
              
              let newMarker = null;
              if (activeId) newMarker = markersList.find(m => m.rowIds && m.rowIds.includes(activeId));
              if (!newMarker && activeLat && activeLng) newMarker = markersList.find(m => Math.abs(m.position.lat - activeLat) < 0.00001 && Math.abs(m.position.lng - activeLng) < 0.00001);
              if (newMarker) highlightMarker(newMarker);
              
          } catch(e) {
              if(e.message && e.message.includes("パスワード")) forceLogout();
              else if(!silent) alert("エラーが発生しました: " + e.message);
          } finally { document.getElementById("saving-overlay").style.display = "none"; }
      };

      function renderViewTabs() {
          const bar = document.getElementById("view-tab-bar"); bar.innerHTML = "";
          currentTabs.forEach((tab, index) => {
              const el = document.createElement("div");
              el.className = `tab ${index === activeTabIndex ? 'active' : ''}`; el.innerText = tab.label || `区画${index + 1}`;
              el.onclick = (e) => { 
                  e.stopPropagation(); activeTabIndex = index; 
                  loadViewData(currentTabs[index].data); renderViewTabs(); 
                  document.getElementById("view-container").scrollTop = 0;
                  updateAttButtonUI(currentTabs[index].data.is_att);
              }; 
              bar.appendChild(el);
          });
      }

      const formatAreaStrict = (v) => {
          if(v == null || (!v && v!==0 && v!=="0")) return "";
          let n = parseFloat(v.toString().replace(/,/g, ""));
          if(isNaN(n)) return "";
          let p = n.toFixed(2).split(".");
          p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          return p.join(".");
      };
      function removeComma(val) {
          if(val == null) return ""; 
          return val.toString().replace(/,/g, ""); 
      }
      function formatNumberWithComma(val) {
          if (val == null || (!val && val !== 0 && val !== "0")) return ""; 
          let raw = val.toString().replace(/,/g, "");
          if (isNaN(raw) || raw === "") return val;
          const parts = raw.split("."); parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); return parts.join(".");
      }

      async function fetchViewFiles(data, containerId) {
          const el = document.getElementById(containerId);
          if (!el) return;
          try {
              let typeStr = data.type || "種別未定";
              let nameStr = data.name || "名称未定";
              let folderName = `view-${typeStr}-${nameStr}`.replace(/[\\/:*?"<>|]/g, '_'); 

              const res = await fetch(GAS_URL, { 
                  method: "POST", headers: { "Content-Type": "text/plain" }, 
                  body: JSON.stringify({ mode: "get_files", reqUser: getUser(), password: getPass(), addr1: data.addr1 || "", addr2: data.addr2 || "", folderName: folderName, groupId: data.id }) 
              });
              const result = await res.json();
              if (result.error) throw new Error(result.error);
              
              if (result.files.length === 0) { 
                  el.innerHTML = "<div style='color:#999; text-align:center; font-size:12px;'>ファイルはまだありません</div>"; 
                  return; 
              }
              
              let html = "<div style='display:flex; flex-direction:column; gap:6px;'>";
              result.files.forEach(f => {
                  html += `<a href="${f.url}" target="_blank" style="display:block; padding:8px 12px; background:#fff; border:1px solid #ddd; border-radius:6px; color:#1a73e8; text-decoration:none; font-weight:bold; font-size:13px; word-break:break-all; box-shadow:0 1px 2px rgba(0,0,0,0.05);">📎 ${f.name}</a>`;
              });
              html += "</div>";
              
              el.innerHTML = html;
          } catch (err) { 
              if(err.message.includes("パスワード")) forceLogout();
              else el.innerHTML = `<div style='color:red; text-align:center; font-size:12px;'>ファイルの読み込みに失敗しました</div>`; 
          }
      }

      function loadViewData(data) {
          const container = document.getElementById("view-container");

          if(data.p_first) prices.push({p: data.p_first});

          if(data.p_c3) prices.push({p: data.p_c3});
          
          let isSold = (data.is_sold === true || data.is_sold === "TRUE");
          if(isSold && data.p_s) prices.push({p: data.p_s, sold: true});
          
          let latestPriceStr = prices.length > 0 ? prices[prices.length - 1].p : "";
          let latestPriceNum = parseFloat(removeComma(latestPriceStr)) || 0;

          let displayLatestPrice = latestPriceStr ? formatNumberWithComma(latestPriceStr) + " 万円" : "価格未定";
          if(isSold) displayLatestPrice = "成約済: " + displayLatestPrice;
          
          let historyStr = "";

          }

          let subPStr = data.sub_p !== undefined && data.sub_p !== "" ? data.sub_p.toString() : "";

          let bTsubo = parseFloat(data.b_tsubo) || 0;
          let type = data.type || "";

          const patternA = ["新築戸建", "中古戸建", "自社新築", "自社中古", "自社新築(情開)", "自社中古(情開)"];
          const patternB = ["売地", "自社売地", "自社売地(情開)", "査定依頼"];
          const patternC = ["新築MS", "中古MS", "査定依頼MS", "自社中古MS(情開)"];

          let unitPriceStr = "";
          if (patternA.includes(type)) {
              if (subPStr === "") {
                  unitPriceStr = "土地坪単価: 建物価格入力待ち";

                  let unitPrice = (latestPriceNum - subP) / lTsubo;

              }

              if (latestPriceNum > 0 && lTsubo > 0) {

          // ▼ マップURLの構文エラーを修正し、スプレッドシートの過去データに依存せず常に正しいURLを生成
          let mapLinkUrl = `https://www.google.com/maps/search/?api=1&query=${data.lat},${data.lng}`;

                  <div style="font-size:12px; margin-top:4px;">

                  </div>

                  ${unitPriceStr ? `<div class="view-unit-price">${unitPriceStr}</div>` : ""}

          const vItem = (label, val, full = false, isAlert = false) => {

          };

          html += vItem("業者・支店", (data.gyosha||"") + " " + (data.shiten||""), true);
          html += vItem("態様 / 媒体", (data.taiyou||"-") + " / " + (data.media||"-"));
          html += vItem("担当者", data.intro_user);
          html += `</div>`;

          html += `<div class="section-title">面積・間取り</div><div class="view-grid">`;
          html += vItem("土地面積", data.t_m2 ? `${formatAreaStrict(data.t_m2)} ㎡ (${formatAreaStrict(data.t_tsubo)} 坪)` : "");
          html += vItem("建物面積", data.b_m2 ? `${formatAreaStrict(data.b_m2)} ㎡ (${formatAreaStrict(data.b_tsubo)} 坪)` : "");
          html += vItem("敷地条件・間取り", data.layout, true);
          
          if(patternA.includes(type) && subPStr !== "") {
              let buildHtml = "";
              if (subP > 0 && bTsubo > 0) {
                  let bUnit = subP / bTsubo;
                  buildHtml = `<div style="display:flex; align-items:baseline; flex-wrap:wrap; gap:8px;">
                                  <span>${formatNumberWithComma(subPStr)} 万円</span>
                                  <span style="font-weight:bold; color:#c41d7f; font-size:13px;">（坪単価：${bUnit.toLocaleString(undefined, {maximumFractionDigits: 1})} 万円/坪）</span>
                               </div>`;
              } else {
                  buildHtml = `${formatNumberWithComma(subPStr)} 万円`;
              }
              html += vItem("建物想定価格", buildHtml, true); 
          }
          html += `</div>`;

          html += `<div class="section-title">公法制限・接道・交通</div><div class="view-grid">`;
          html += vItem("建蔽 / 容積", (data.kenpei||"-") + "% / " + (data.youseki||"-") + "%");
          html += vItem("公法制限", data.law);
          html += vItem("接道状況", data.road, true);
          html += vItem("最寄駅", (data.train_line||"") + " " + (data.train_station||""));
          html += vItem("徒歩", data.train_walk ? `${data.train_walk} 分` : "");
          html += `</div>`;

          html += `<div class="section-title">その他</div><div class="view-grid">`;
          if(data.price_memo) html += vItem("備考（価格）", data.price_memo, true);
          if(data.train_memo) html += vItem("備考（交通）", data.train_memo, true);
          if(data.memo) html += vItem("備考（全体）", data.memo, true);
          if(data.url1) html += vItem("参考URL 1", `<a href="${data.url1}" target="_blank" style="font-weight:normal;">リンクを開く</a>`);
          if(data.url2) html += vItem("参考URL 2", `<a href="${data.url2}" target="_blank" style="font-weight:normal;">リンクを開く</a>`);
          html += vItem("入力担当", data.user);
          html += `</div>`;

          let fileAreaId = "view-file-list-" + data.id;
          html += `<div class="section-title">添付ファイル</div>
                   <div id="${fileAreaId}" style="background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #e8eaed;">
                       ${data.drive_url ? `<div style="color:#666; text-align:center; font-size:12px;">ファイルを読み込み中...</div>` : `<div style='color:#999; text-align:center; font-size:12px;'>ファイルはまだありません</div>`}
                   </div>`;

          if (data.siire_p || data.siire_m2) {
              html += `<div class="section-title">仕入分析</div><div class="view-grid">`;
              
              let siireP = parseFloat(removeComma(data.siire_p)) || 0;
              let siireTsubo = parseFloat(removeComma(data.siire_tsubo)) || 0;
              let sUnitStr = "-";
              if (siireP > 0 && siireTsubo > 0) {
                  let sUnit = Math.round((siireP / siireTsubo) * 10) / 10;
                  sUnitStr = sUnit.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " 万円/坪";
              }
              
              let basisStr = data.siire_basis ? ` <span style="font-size:11px; font-weight:normal; color:#666; margin-left:10px;">[根拠: ${data.siire_basis}]</span>` : "";
              let priceText = data.siire_p ? `${formatNumberWithComma(data.siire_p)} 万円` : `未入力`;
              
              let empUnit = `<span style="background:#fffbe6; color:#cf1322; padding:4px 8px; border-radius:6px; border:1px solid #ffe58f; font-size:16px; margin-left:12px; display:inline-block;">坪単価: ${sUnitStr}</span>`;

              html += `<div class="view-item full-width" style="background: #f6ffed; border-color: #b7eb8f;">
                          <span style="color:#52c41a;">購入価格 （仕入坪単価）</span>
                          <div style="color:#135200; font-size: 14px; font-weight: bold; margin-top:6px; display:flex; align-items:center; flex-wrap:wrap;">
                              ${priceText} ${empUnit} ${basisStr}
                          </div>
                       </div>`;
                       
              html += vItem("仕入土地面積", data.siire_m2 ? `${formatAreaStrict(data.siire_m2)} ㎡ (${formatAreaStrict(data.siire_tsubo)} 坪)` : "", true);
              html += `</div>`;
          }

          container.innerHTML = html;

          if (data.drive_url) {
              fetchViewFiles(data, fileAreaId);
          }
      }

      function renderTabs() {
        const bar = document.getElementById("tab-bar"); bar.innerHTML = "";
        currentTabs.forEach((tab, index) => {
            const el = document.createElement("div");
            el.className = `tab ${index === activeTabIndex ? 'active' : ''}`; el.innerText = tab.label || `区画${index + 1}`;
            el.onclick = (e) => { e.stopPropagation(); switchTab(index); }; 
            bar.appendChild(el);
        });
        const addBtn = document.createElement("div"); addBtn.className = "tab tab-add"; addBtn.innerText = "＋追加";
        addBtn.onclick = (e) => { e.stopPropagation(); addTab(); }; bar.appendChild(addBtn);
      }

      function switchTab(index) { 
          saveCurrentTabData(); activeTabIndex = index; 
          loadTabData(currentTabs[index].data); renderTabs(); 
          document.getElementById("form-container").scrollTop = 0;
          updateAttButtonUI(currentTabs[index].data.is_att);
      }

      function addTab() {
        saveCurrentTabData();
        const baseData = JSON.parse(JSON.stringify(currentTabs[0].data));
        baseData.id = ""; baseData.tab_name = `区画${currentTabs.length + 1}`;
        ["p_first", "p_c1", "p_c2", "p_c3", "p_s", "t_m2", "t_tsubo", "b_m2", "b_tsubo", "layout", "sub_p", "is_sold", "d_first", "d_c1", "d_c2", "d_c3", "d_s", "user"].forEach(k => baseData[k] = "");
        baseData.is_att = false; baseData.user = getUser();
        currentTabs.push({ label: baseData.tab_name, data: baseData });
        activeTabIndex = currentTabs.length - 1; loadTabData(baseData); renderTabs();
      }

      function saveCurrentTabData() {
        const data = currentTabs[activeTabIndex].data;
        Object.keys(FORM_MAP).forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            if(el.type === 'checkbox') data[FORM_MAP[id]] = el.checked; else data[FORM_MAP[id]] = removeComma(el.value);
        });
        currentTabs[activeTabIndex].label = data.tab_name;
      }

      function loadTabData(data) {
        Object.keys(FORM_MAP).forEach(id => {
            const el = document.getElementById(id); if(!el) return;
            const val = data[FORM_MAP[id]] !== undefined ? data[FORM_MAP[id]] : "";
            if(el.type === 'checkbox') el.checked = !!val;
            else if (el.classList.contains('date-input')) el.value = formatToFullDate(val);
            else if (el.classList.contains('area-input')) el.value = formatAreaStrict(val);
            else if (el.classList.contains('comma-input')) el.value = formatNumberWithComma(val);
            else el.value = val;
        });
        document.getElementById("delete-btn").style.display = data.id ? "block" : "none";
        updateAutoFields();
      }

      function buildFolderName() {
          if(!currentTabs || currentTabs.length === 0) return "未設定物件";
          const d0 = currentTabs[0].data;

          let dateStr = "";
          if (d0.id && allData) {
              const row = allData.find(r => String(r["ID"]) === String(d0.id));
              if (row && row["入力日"]) {
                  const d = new Date(row["入力日"]);
                  if(!isNaN(d)) dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
              }
          }
          if (!dateStr) {
              const d = new Date();
              dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
          }

          let typeStr = "";
          const types = [...new Set(currentTabs.map(t => t.data.type).filter(Boolean))];
          if (currentTabs.length > 1 && types.length > 1) typeStr = "多棟現場";
          else typeStr = types[0] || "種別未定";

          let nameStr = d0.name || "";
          if (!nameStr) {
              const g = d0.gyosha || ""; const s = d0.shiten || ""; const t = d0.taiyou || "";
              nameStr = `${g}${s}`;
              if (t) nameStr += (nameStr ? "-" : "") + t;
              if (!nameStr) nameStr = "名称未定";
          }

          let addrStr = (d0.addr2 || "") + (d0.addr3 || "");
          if (!addrStr) addrStr = "住所未定";

          let folderName = `${dateStr}-${typeStr}-${nameStr}-${addrStr}`;
          return folderName.replace(/[\\/:*?"<>|]/g, '_'); 
      }

      const dropZone = document.getElementById('file-manager');
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
      document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));

      function handleFiles(files) {
          saveCurrentTabData(); 
          for (let i = 0; i < files.length; i++) uploadFile(files[i]);
      }

      function uploadFile(file) {
          const addr1 = currentTabs[0].data.addr1 || "";
          const addr2 = currentTabs[0].data.addr2 || ""; 
          const folderName = buildFolderName();
          const groupId = currentTabs[0].data.id;
          
          const listEl = document.getElementById('file-list');
          listEl.innerHTML = `<div style="color:#1a73e8; text-align:center;">送信中: ${file.name}...</div>` + listEl.innerHTML;
          
          const reader = new FileReader();
          reader.onload = async (e) => {
              try {
                  const res = await fetch(GAS_URL, {
                      method: "POST",
                      headers: { "Content-Type": "text/plain" },
                      body: JSON.stringify({ mode: "upload_file", reqUser: getUser(), password: getPass(), addr1, addr2, folderName, groupId, filename: file.name, data: e.target.result })
                  });
                  const result = await res.json();
                  if (result.error) throw new Error(result.error);
                  refreshFileList();
              } catch (err) { 
                  if(err.message.includes("パスワードが正しくありません")) forceLogout();
                  else { alert("アップロード失敗: " + err.message); refreshFileList(); }
              }
          };
          reader.readAsDataURL(file);
      }

      async function refreshFileList() {
          saveCurrentTabData();
          const addr1 = currentTabs[0].data.addr1 || "";
          const addr2 = currentTabs[0].data.addr2 || ""; 
          const folderName = buildFolderName();
          const groupId = currentTabs[0].data.id;
          const listEl = document.getElementById('file-list');
          
          listEl.innerHTML = "<div style='color:#666; text-align:center;'>ファイル一覧を取得中...</div>";
          try {
              const res = await fetch(GAS_URL, { 
                  method: "POST", headers: { "Content-Type": "text/plain" }, 
                  body: JSON.stringify({ mode: "get_files", reqUser: getUser(), password: getPass(), addr1, addr2, folderName, groupId }) 
              });
              const result = await res.json();
              if (result.error) throw new Error(result.error);
              
              listEl.innerHTML = "";
              if (result.files.length === 0) { listEl.innerHTML = "<div style='color:#999; text-align:center;'>ファイルはまだありません</div>"; return; }
              
              result.files.forEach(f => {
                  const row = document.createElement("div"); row.className = "file-item";
                  const link = document.createElement("a"); link.href = f.url; link.target = "_blank"; link.innerText = f.name;
                  const actions = document.createElement("div"); actions.className = "file-actions";
                  
                  const btnRen = document.createElement("button"); btnRen.innerText = "変更";
                  btnRen.onclick = () => renameFile(f.id, f.name);
                  const btnDel = document.createElement("button"); btnDel.innerText = "削除"; btnDel.className = "del";
                  btnDel.onclick = () => deleteFile(f.id);
                  
                  actions.appendChild(btnRen); actions.appendChild(btnDel);
                  row.appendChild(link); row.appendChild(actions); listEl.appendChild(row);
              });
          } catch (err) { 
              if(err.message.includes("パスワードが正しくありません")) forceLogout();
              else listEl.innerHTML = `<div style='color:red; text-align:center;'>取得失敗: ${err.message}</div>`; 
          }
      }

      async function renameFile(id, oldName) {
          const newName = prompt("新しいファイル名を入力してください", oldName);
          if (!newName || newName === oldName) return;

      function formatToFullDate(val) {
          if (!val) return ""; let input = val.toString().trim();
          if (input.includes('T') && input.includes('Z')) {
              const d = new Date(input); if (!isNaN(d)) return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
          }
          input = input.replace(/[０-９／]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/[-\.]/g, '/');
          let year, month, day; const parts = input.split('/');
          if (parts.length === 2) { year = new Date().getFullYear(); month = parseInt(parts[0], 10); day = parseInt(parts[1], 10); }
          else if (parts.length === 3) { year = parseInt(parts[0], 10); if (year < 100) year += 2000; month = parseInt(parts[1], 10); day = parseInt(parts[2], 10); }
          else if (input.length === 8 && !isNaN(input)) { year = parseInt(input.substring(0,4), 10); month = parseInt(input.substring(4,6), 10); day = parseInt(input.substring(6,8), 10); }
          else { return input; }
          const d = new Date(year, month - 1, day);
          if (d.getFullYear() === year && d.getMonth() === month - 1 && d.getDate() === day) return `${year}/${String(month).padStart(2, '0')}/${String(day).padStart(2, '0')}`;
          else return ""; 
      }

      async function processMissingCoords(missingRows) {
          let updates = [];
          for (let row of missingRows) {
              const addr = (row["市・区"] || "") + (row["所在（丁目まで）"] || "") + (row["住居表示（丁目以降）"] || "");
              if (addr) {
                  try {
                      const res = await new Promise((resolve, reject) => {
                          geocoder.geocode({ address: addr }, (results, status) => {
                              if (status === "OK") resolve(results[0].geometry.location);
                              else reject(status);
                          });
                      });
                      row["緯度"] = res.lat();
                      row["経度"] = res.lng();
                      updates.push({ id: row["ID"], lat: res.lat(), lng: res.lng() });
                      await new Promise(r => setTimeout(r, 400));
                  } catch(e) { console.warn("Geocode failed for: " + addr); }
              }
          }
          if (updates.length > 0) {
              fetch(GAS_URL, {
                  method: "POST", headers: { "Content-Type": "text/plain" },
                  body: JSON.stringify({ mode: "update_coords", reqUser: getUser(), password: getPass(), data: updates })
              }).then(() => renderMarkers()).catch(()=>{});
              renderMarkers();
          }
      }

      function renderMarkers() {
        if (clusterer) clusterer.clearMarkers();
        markersList.forEach(m => m.map = null); markersList = [];
        
        const activeFilters = Array.from(document.querySelectorAll('.layer-cb:checked')).map(cb => cb.value);
        const showSold = document.getElementById('layer-sold') ? document.getElementById('layer-sold').checked : false;
        const onlyAtt = document.getElementById('layer-att') ? document.getElementById('layer-att').checked : false;
        
        const dateType = document.getElementById('filter-date-type').value;
        const dateStart = document.getElementById('filter-date-start').value;
        const dateEnd = document.getElementById('filter-date-end').value;
        const filterUser = document.getElementById('filter-user').value;

        const groups = {};
        allData.forEach(row => {
            if (!row["緯度"] || !row["経度"]) return; 
            
            // 1. 成約済フィルターのチェック
            const isSold = (row["成約フラグ"] === true || row["成約フラグ"] === "TRUE");
            if (isSold && !showSold) return;

            // 2. 物件種別フィルターのチェック
            let isVisible = false;
            const t = row["物件種別"] || "";
            if (t.includes("情開")) isVisible = activeFilters.includes("自社（情開）");
            else if (t.includes("自社")) isVisible = activeFilters.includes("自社物件");
            else if (t.includes("MS")) isVisible = activeFilters.includes("MS");
            else if (t.includes("査定")) isVisible = activeFilters.includes("査定");
            else if (t === "新築戸建") isVisible = activeFilters.includes("新築戸建");
            else if (t === "中古戸建") isVisible = activeFilters.includes("中古戸建");
            else if (t === "売地") isVisible = activeFilters.includes("売地");
            else isVisible = true;

            if (!isVisible) return;

            // 3. 注目フィルターのチェック
            const isAtt = (row["注目継続"] === true || row["注目継続"] === "TRUE");
            if (onlyAtt && !isAtt) return;

            // 4. 入力者フィルターのチェック
            if (filterUser && row["入力者"] !== filterUser) return;

            // 5. 日付フィルターのチェック
            if (dateStart || dateEnd) {
                let targetVal = row[dateType];
                if (!targetVal) return; 
                
                let targetDate = new Date(targetVal);
                if (isNaN(targetDate.getTime())) return;
                targetDate.setHours(0,0,0,0);
                
                if (dateStart) {
                    let s = new Date(dateStart);
                    s.setHours(0,0,0,0);
                    if (targetDate < s) return;
                }
                if (dateEnd) {
                    let e = new Date(dateEnd);
                    e.setHours(0,0,0,0);
                    if (targetDate > e) return;
                }
            }

            const key = `${Number(row["緯度"]).toFixed(6)}_${Number(row["経度"]).toFixed(6)}`;
            if (!groups[key]) groups[key] = []; 
            groups[key].push(row);
        });

        markersList = Object.keys(groups).map(key => {
            const rows = groups[key]; const first = rows[0]; const ids = rows.map(r => r["ID"]).join(",");
            const img = document.createElement("img");
            
            if (rows.length > 1) {
                const allSold = rows.every(r => r["成約フラグ"] === true || r["成約フラグ"] === "TRUE");
                const hasJishaNew = rows.some(r => r["物件種別"] === "自社新築");
                const hasJishaNewInfo = rows.some(r => r["物件種別"] === "自社新築(情開)");
                if (allSold) img.src = "https://sohken-homes.github.io/icon_town-sold.png";
                else if (hasJishaNew) img.src = "https://sohken-homes.github.io/icon_jisha_new_town.png";
                else if (hasJishaNewInfo) img.src = "https://sohken-homes.github.io/icon_jisha_new_info_town.png";
                else img.src = "https://sohken-homes.github.io/icon_new_house_town.png";
            } else { 
                const isSold = (first["成約フラグ"] === true || first["成約フラグ"] === "TRUE");
                const pType = first["物件種別"] || "";
                
                if (isSold) {
                    if (["新築MS", "中古MS", "自社中古MS(情開)"].includes(pType)) {
                        img.src = "https://sohken-homes.github.io/sold_ms.png";
                    } else if (["売地", "自社売地", "自社売地(情開)"].includes(pType)) {
                        img.src = "https://sohken-homes.github.io/sold_land.png";
                    } else if (pType === "査定依頼") {
                        img.src = "https://sohken-homes.github.io/sold_satei.png";
                    } else if (pType === "査定依頼MS") {
                        img.src = "https://sohken-homes.github.io/sold_satei_ms.png";
                    } else {
                        img.src = "https://sohken-homes.github.io/sold_house.png"; 
                    }
                } else {
                    img.src = ICON_MAP[pType] || ICON_MAP["DEFAULT"];
                }
            }
            img.style.width = "32px"; img.style.cursor = "pointer";
            
            const div = document.createElement("div");
            div.style.position = "relative";
            div.style.display = "inline-block";
            div.appendChild(img);

            // ▼ グループ内に「注目」物件が1つでもあればマーカーにフラグを立てる
            const anyIsAtt = rows.some(r => r["注目継続"] === true || r["注目継続"] === "TRUE");
            if(anyIsAtt) {
                const ring = document.createElement("div");
                ring.className = "attention-ring";
                div.appendChild(ring);
            }

            const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat: Number(first["緯度"]), lng: Number(first["経度"]) }, map: map, content: div });
            marker.rowIds = ids;
            marker.isAtt = anyIsAtt; // クラスター判定用にフラグを持たせる
            
            div.addEventListener("click", (e) => {
                e.stopPropagation(); 
                if(isSaving || isDragging || dragLock) return; 
                openView(marker.rowIds, marker);
            });

            div.addEventListener("dblclick", (e) => {
                e.stopPropagation(); 
                if(isSaving) return;
                openView(marker.rowIds, marker);
                setTimeout(() => switchToEdit(), 50);
            });

            return marker;
        });

        if (!clusterer) {
            clusterer = new markerClusterer.MarkerClusterer({ 
                map, 
                markers: markersList, 
                renderer: customClusterRenderer, // カスタムRendererをセット
                onClusterClick: (event, cluster, map) => { 
                    const bounds = new google.maps.LatLngBounds(); 
                    cluster.markers.forEach(m => bounds.extend(m.position)); 
                    map.fitBounds(bounds, 100); 
                } 
            });
        } else { 
            clusterer.addMarkers(markersList); 
        }
      }

            cb.addEventListener('change', () => {
                const allCb = document.querySelectorAll('.layer-cb');
                const checkedCb = document.querySelectorAll('.layer-cb:checked');
                document.getElementById('layer-all').checked = (allCb.length === checkedCb.length);
                renderMarkers();
            });
        });

        if(document.getElementById('layer-sold')) document.getElementById('layer-sold').addEventListener('change', renderMarkers);
        if(document.getElementById('layer-att')) document.getElementById('layer-att').addEventListener('change', renderMarkers);
        
        document.getElementById('filter-date-type').addEventListener('change', renderMarkers);
        document.getElementById('filter-user').addEventListener('change', renderMarkers);
        
        ['filter-date-start', 'filter-date-end'].forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('blur', (e) => {
                    e.target.value = formatToFullDate(e.target.value);
                    renderMarkers();
                });
                el.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter') e.target.blur();
                });
            }
        });
        
        document.getElementById('clear-date-btn').addEventListener('click', () => {
            document.getElementById('filter-date-start').value = "";
            document.getElementById('filter-date-end').value = "";
            renderMarkers();
        });

        const container = document.getElementById("form-container");
        container.addEventListener('input', (e) => {
            if (e.target.classList.contains('only-num')) {
                let val = e.target.value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/，/g, ',').replace(/．/g, '.');
                e.target.value = val.replace(/[^0-9\.\,]/g, '');
            }
        });
        container.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault(); const inputs = Array.from(container.querySelectorAll('input, select, button'));
                const index = inputs.indexOf(e.target); if (index > -1 && index < inputs.length - 1) inputs[index + 1].focus();
            }
        });
        container.addEventListener('blur', (e) => {
            if(e.target.classList.contains('area-input')) { e.target.value = formatAreaStrict(e.target.value); updateAutoFields(); } 
            else if(e.target.classList.contains('comma-input')) { e.target.value = formatNumberWithComma(e.target.value); updateAutoFields(); }
            if(e.target.classList.contains('date-input')) e.target.value = formatToFullDate(e.target.value);
        }, true);
        container.addEventListener('focus', (e) => {
            if(e.target.classList.contains('comma-input') || e.target.classList.contains('area-input')) e.target.value = removeComma(e.target.value);
        }, true);
        
        const autoFieldTriggers = ['form-type', 'form-p-first', 'form-p-c1', 'form-p-c2', 'form-p-c3', 'form-p-s', 'form-sub-price', 'form-t-tsubo', 'form-b-tsubo', 'siire-price', 'siire-m2'];
        autoFieldTriggers.forEach(id => {
            const el = document.getElementById(id);
            if(el) { el.addEventListener('input', updateAutoFields); el.addEventListener('change', updateAutoFields); }
        });
        
        const syncArea = (m2Id, tsuboId) => {
            const el = document.getElementById(m2Id);
            if(el) { el.addEventListener('blur', (e) => {
                const v = removeComma(e.target.value);
                if(v) document.getElementById(tsuboId).value = formatAreaStrict((Math.floor((v * 0.3025) * 100) / 100).toFixed(2));
                else document.getElementById(tsuboId).value = "";
                updateAutoFields();
            });}
        };
        syncArea('form-t-m2', 'form-t-tsubo'); syncArea('form-b-m2', 'form-b-tsubo'); syncArea('siire-m2', 'siire-tsubo');

        const autoCheckSold = () => {
            if (document.getElementById('form-d-s').value.trim() !== "" || document.getElementById('form-p-s').value.trim() !== "") document.getElementById('form-is-sold').checked = true;
        };
        document.getElementById('form-d-s').addEventListener('blur', autoCheckSold);
        document.getElementById('form-p-s').addEventListener('blur', autoCheckSold); document.getElementById('form-p-s').addEventListener('input', autoCheckSold);
      });
    </script>
</body>
</html>
