<!DOCTYPE html>
<html>
<head>
    <title>不動産管理マップ v4</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        #editor-panel {
            display: none; position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 380px;
            max-height: 95vh; overflow-y: auto;
        }
        #editor-panel h3 { margin: 0 0 15px 0; font-size: 18px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; 
        }
        .flex-row { display: flex; gap: 8px; align-items: center; }
        .unit-label { font-size: 12px; color: #888; white-space: nowrap; width: 20px; }
        #unit-price-container { background: #fffbe6; padding: 12px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; }
        .price-display { font-size: 16px; font-weight: bold; color: #d93025; }
        .btn-save { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h3>物件登録・編集</h3>
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-lat">
        <input type="hidden" id="form-lng">

        <div class="section-title">基本情報</div>
        <div class="form-group">
            <label>物件種別</label>
            <select id="form-type">
                <option value="">選択してください</option>
                <optgroup label="他社物件">
                    <option value="他社分譲">他社分譲</option>
                    <option value="中古戸建">中古戸建</option>
                    <option value="中古MS">中古MS</option>
                    <option value="土地">土地</option>
                </optgroup>
                <optgroup label="自社物件">
                    <option value="自社新築">自社新築</option>
                    <option value="自社新築(情開)">自社新築(情開)</option>
                    <option value="自社売地">自社売地</option>
                    <option value="自社売地(情開)">自社売地(情開)</option>
                </optgroup>
                <option value="査定依頼">査定依頼</option>
            </select>
        </div>
        <div class="form-group"><label>区画名（物件名称）</label><input type="text" id="form-name"></div>
        <div class="form-group"><label>住所（市区 / 丁目 / 以降）</label>
            <div class="flex-row">
                <input type="text" id="form-addr1" placeholder="市区">
                <input type="text" id="form-addr2" placeholder="丁目">
                <input type="text" id="form-addr3" placeholder="以降">
            </div>
        </div>
        <div class="form-group"><label>入力者</label><input type="text" id="form-user" placeholder="氏名"></div>

        <div class="section-title">公法制限・接道</div>
        <div class="form-group">
            <label>建蔽率 / 容積率</label>
            <div class="flex-row">
                <input type="text" id="form-kenpei" placeholder="建蔽" class="comma-input"><span class="unit-label">%</span>
                <input type="text" id="form-youseki" placeholder="容積" class="comma-input"><span class="unit-label">%</span>
            </div>
        </div>
        <div class="form-group">
            <label>公法制限 / 接道</label>
            <input type="text" id="form-law" placeholder="第1種低層、準防火など" style="margin-bottom:5px;">
            <input type="text" id="form-road" placeholder="北4.0m公道など">
        </div>

        <div class="section-title">価格推移 (単位: 万円)</div>
        <div class="form-group">
            <label>初回日 / 初回価格</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-d-first" placeholder="yyyy/mm/dd">
                <input type="text" id="form-p-first" placeholder="万円" class="comma-input">
            </div>
            <label>変更価格1 / 変更価格2</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-p-c1" placeholder="変更1" class="comma-input">
                <input type="text" id="form-p-c2" placeholder="変更2" class="comma-input">
            </div>
            <label>成約日 / 成約価格</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-d-s" placeholder="yyyy/mm/dd">
                <input type="text" id="form-p-s" placeholder="成約価格" class="comma-input">
            </div>
            <label>価格に関するメモ</label>
            <textarea id="form-memo-price" rows="2" placeholder="値下げ理由など"></textarea>
        </div>

        <div class="section-title">面積詳細</div>
        <div class="form-group">
            <label>土地面積</label>
            <div class="flex-row">
                <input type="text" id="form-t-m2" placeholder="0.00" class="comma-input"><span class="unit-label">㎡</span>
                <input type="text" id="form-t-tsubo" placeholder="0.00" class="comma-input"><span class="unit-label">坪</span>
            </div>
        </div>
        <div class="form-group">
            <label>建物面積 / 間取り</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-b-m2" placeholder="0.00" class="comma-input"><span class="unit-label">㎡</span>
                <input type="text" id="form-b-tsubo" placeholder="0.00" class="comma-input"><span class="unit-label">坪</span>
            </div>
            <input type="text" id="form-layout" placeholder="4LDK">
        </div>

        <div class="section-title">単価計算（自動判定）</div>
        <div id="unit-price-container">
            <div id="build-price-input" style="display:none; margin-bottom:10px;">
                <label style="font-size:10px; color:#c41d7f;">初回建物価格を入力（万円）</label>
                <input type="text" id="form-sub-price" placeholder="建物価格" class="comma-input">
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                    <span id="label-land" style="font-size:12px;">土地坪単価：</span>
                    <span id="val-land" class="price-display">- 万円</span>
                </div>
                <div id="row-build" style="display:none; justify-content:space-between;">
                    <span style="font-size:12px;">建物坪単価：</span>
                    <span id="val-build" class="price-display">- 万円</span>
                </div>
            </div>
            <div id="calc-note" style="font-size:10px; color:#888; margin-top:5px; border-top:1px dotted #ccc; pt:5px;"></div>
        </div>

        <div class="section-title">備考・URL</div>
        <div class="form-group">
            <label>参考URL 1 / 2</label>
            <input type="url" id="form-url1" placeholder="https://..." style="margin-bottom:5px;">
            <input type="url" id="form-url2" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>全体メモ</label>
            <textarea id="form-memo" rows="2" placeholder="補足情報など"></textarea>
        </div>

        <button class="btn-save" onclick="submitForm()">この内容で保存する</button>
        <button class="btn-cancel" onclick="closePanel()">キャンセル</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxr1eWbWn1UKBsuDNoZNxnOhqCaNWVorvZQkFMj4cASsMkuIBo09r918yBrhN6qcwq4/exec";

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
      script.async = true; script.defer = true;
      document.head.appendChild(script);

      let map, sharedInfoWindow, allData = [];

      // --- カンマ区切り制御関数 ---
      function formatNumberWithComma(val) {
        if (!val && val !== 0) return "";
        const parts = val.toString().split(".");
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join(".");
      }

      function removeComma(val) {
        return val.toString().replace(/,/g, "");
      }

      function applyCommaFormat(el) {
        const rawValue = removeComma(el.value);
        if (isNaN(rawValue) || rawValue === "") return;
        el.value = formatNumberWithComma(rawValue);
      }

      async function initMap() {
        const { Map, InfoWindow } = google.maps;
        map = new Map(document.getElementById("map"), { center: { lat: 35.700, lng: 139.630 }, zoom: 14, mapId: MAP_ID });
        sharedInfoWindow = new InfoWindow();
        map.addListener("click", () => { sharedInfoWindow.close(); closePanel(); });
        map.addListener("dblclick", (e) => addNewProperty(e.latLng.lat(), e.latLng.lng()));
        loadMarkers();
      }

async function loadMarkers() {
        try {
            const res = await fetch(GAS_URL, { redirect: "follow" });
            allData = await res.json();
            const markers = allData.map(row => {
                if (!row["緯度"] || !row["経度"]) return null;
                const marker = new google.maps.marker.AdvancedMarkerElement({ 
                    position: { lat: Number(row["緯度"]), lng: Number(row["経度"]) }, 
                    map: map 
                });
                
                marker.addListener("click", () => {
                    const fmt = (v) => v ? Number(v).toLocaleString() : "-";
                    let chain = `${fmt(row["販売価格（初回入力時/万円）"])}`;
                    if (row["変更価格１（万円）"]) chain += ` → ${fmt(row["変更価格１（万円）"])}`;
                    if (row["成約価格（万円）"]) chain += ` → <span style="color:#d93025;">${fmt(row["成約価格（万円）"]}</span>`;
                    
                    // エラー回避のため、IDを変数に一度格納
                    const currentId = row["ID"];

                    let html = `
                    <div style="min-width:250px; line-height:1.6; font-family: sans-serif;">
                        <div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px;">${row["区画名"] || "未設定"}</div>
                        <div style="background:#fff1f0; padding:8px; margin:8px 0; border:1px solid #ffa39e; border-radius:4px; text-align:center;">
                            <strong>${chain} 万円</strong>
                        </div>
                        <div style="font-size:12px; color:#666; margin-bottom:10px;">
                            ${row["市・区"] || ""}${row["所在（丁目まで）"] || ""}...
                        </div>
                        <button style="width:100%; padding:10px; background:#1a73e8; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;" 
                                onclick="openEdit('${currentId}')">詳細・編集を表示</button>
                    </div>`;
                    
                    sharedInfoWindow.setContent(html);
                    sharedInfoWindow.open(map, marker);
                });
                return marker;
            }).filter(m => m !== null);
            new markerClusterer.MarkerClusterer({ map, markers });
        } catch (e) { console.error("データ読み込みエラー:", e); }
      }
      function updateAutoFields() {
        const type = document.getElementById('form-type').value;
        const pFirst = parseFloat(removeComma(document.getElementById('form-p-first').value)) || 0;
        const pS = parseFloat(removeComma(document.getElementById('form-p-s').value)) || 0;
        const subP = parseFloat(removeComma(document.getElementById('form-sub-price').value)) || 0;
        const lTsubo = parseFloat(removeComma(document.getElementById('form-t-tsubo').value)) || 0;
        const bTsubo = parseFloat(removeComma(document.getElementById('form-b-tsubo').value)) || 0;

        const buildArea = document.getElementById('build-price-input');
        const rowBuild = document.getElementById('row-build');
        const labelLand = document.getElementById('label-land');
        const valLand = document.getElementById('val-land');
        const valBuild = document.getElementById('val-build');

        buildArea.style.display = "none";
        rowBuild.style.display = "none";
        labelLand.innerText = "土地坪単価：";

        const currentP = pS || parseFloat(removeComma(document.getElementById('form-p-c2').value)) || parseFloat(removeComma(document.getElementById('form-p-c1').value)) || pFirst;
        if (currentP === 0) { valLand.innerText = "- 万円"; return; }
        const ratio = pFirst > 0 ? (currentP / pFirst) : 1;
        const fmt = (num) => num.toLocaleString(undefined, {maximumFractionDigits: 1});

        if (type.includes("MS")) {
            labelLand.innerText = "MS床単価：";
            if (bTsubo > 0) valLand.innerText = fmt((pFirst / bTsubo) * ratio) + " 万円";
        } else if (type.includes("新築") || type.includes("中古戸建") || type.includes("他社分譲")) {
            buildArea.style.display = "block";
            rowBuild.style.display = "flex";
            if (subP > 0 && lTsubo > 0 && bTsubo > 0) {
                valLand.innerText = fmt(((pFirst - subP) / lTsubo) * ratio) + " 万円";
                valBuild.innerText = fmt((subP / bTsubo) * ratio) + " 万円";
            }
        } else {
            if (lTsubo > 0) valLand.innerText = fmt((pFirst / lTsubo) * ratio) + " 万円";
        }
      }

      window.addEventListener('load', () => {
        // カンマリアルタイム適用
        document.querySelectorAll('.comma-input').forEach(el => {
            el.addEventListener('input', () => {
                applyCommaFormat(el);
                updateAutoFields();
            });
        });

        document.getElementById('form-t-m2').addEventListener('blur', (e) => {
            const val = removeComma(e.target.value);
            if(val) {
                document.getElementById('form-t-tsubo').value = formatNumberWithComma(Math.floor((val * 0.3025) * 100) / 100);
            }
            updateAutoFields();
        });
        document.getElementById('form-b-m2').addEventListener('blur', (e) => {
            const val = removeComma(e.target.value);
            if(val) {
                document.getElementById('form-b-tsubo').value = formatNumberWithComma(Math.floor((val * 0.3025) * 100) / 100);
            }
            updateAutoFields();
        });
        document.getElementById('form-type').addEventListener('change', updateAutoFields);
      });

      window.addNewProperty = (lat, lng) => {
        document.getElementById("form-id").value = "";
        document.getElementById("form-lat").value = lat;
        document.getElementById("form-lng").value = lng;
        document.querySelectorAll('#editor-panel input, #editor-panel textarea, #editor-panel select').forEach(el => {
            if(!["form-lat","form-lng"].includes(el.id)) el.value = "";
        });
        updateAutoFields();
        document.getElementById("editor-panel").style.display = "block";
      };

      window.openEdit = (id) => {
        const r = allData.find(d => d["ID"] == id);
        if (!r) return;
        const setV = (id, val) => {
            const el = document.getElementById(id);
            if(el.classList.contains('comma-input')) el.value = formatNumberWithComma(val || "");
            else el.value = val || "";
        };

        document.getElementById("form-id").value = r["ID"];
        document.getElementById("form-lat").value = r["緯度"];
        document.getElementById("form-lng").value = r["経度"];
        setV("form-type", r["物件種別"]);
        setV("form-name", r["区画名"]);
        setV("form-addr1", r["市・区"]);
        setV("form-addr2", r["所在（丁目まで）"]);
        setV("form-addr3", r["住居表示（丁目以降）"]);
        setV("form-user", r["入力者"]);
        setV("form-kenpei", r["建蔽率"]);
        setV("form-youseki", r["容積率"]);
        setV("form-law", r["公法制限"]);
        setV("form-road", r["接道"]);
        setV("form-d-first", r["初回価格入力日"]);
        setV("form-p-first", r["販売価格（初回入力時/万円）"]);
        setV("form-sub-price", r["初回入力時建物価格"]);
        setV("form-p-c1", r["変更価格１（万円）"]);
        setV("form-p-c2", r["変更価格２（万円）"]);
        setV("form-d-s", r["成約日"]);
        setV("form-p-s", r["成約価格（万円）"]);
        setV("form-memo-price", r["メモ（価格）"]);
        setV("form-t-m2", r["地積（㎡）"]);
        setV("form-t-tsubo", r["地積（坪）"]);
        setV("form-b-m2", r["床面積（㎡）・車庫込"]);
        setV("form-b-tsubo", r["床面積（坪）・車庫込"]);
        setV("form-layout", r["建売の場合の間取り（nLDK）"]);
        setV("form-url1", r["参考URL1"]);
        setV("form-url2", r["参考URL2"]);
        setV("form-memo", r["メモ"]);

        updateAutoFields();
        document.getElementById("editor-panel").style.display = "block";
        sharedInfoWindow.close();
      };

      window.submitForm = async () => {
        const getV = (id) => removeComma(document.getElementById(id).value);
        const data = {
          id: document.getElementById("form-id").value, lat: getV("form-lat"), lng: getV("form-lng"),
          type: document.getElementById("form-type").value, name: document.getElementById("form-name").value,
          addr1: getV("form-addr1"), addr2: getV("form-addr2"), addr3: getV("form-addr3"), user: getV("form-user"),
          kenpei: getV("form-kenpei"), youseki: getV("form-youseki"), law: document.getElementById("form-law").value, road: document.getElementById("form-road").value,
          d_first: document.getElementById("form-d-first").value, p_first: getV("form-p-first"), sub_p: getV("form-sub-price"),
          land_unit: removeComma(document.getElementById("val-land").innerText.replace(" 万円","")),
          build_unit: removeComma(document.getElementById("val-build").innerText.replace(" 万円","")),
          p_c1: getV("form-p-c1"), p_c2: getV("form-p-c2"), p_s: getV("form-p-s"), d_s: document.getElementById("form-d-s").value,
          memo_p: document.getElementById("form-memo-price").value,
          t_m2: getV("form-t-m2"), t_tsubo: getV("form-t-tsubo"), b_m2: getV("form-b-m2"), b_tsubo: getV("form-b-tsubo"),
          layout: document.getElementById("form-layout").value, url1: document.getElementById("form-url1").value, url2: document.getElementById("form-url2").value, memo: document.getElementById("form-memo").value
        };

        if(!data.lat || data.lat === "null") { alert("座標エラー"); return; }
        const btn = document.querySelector(".btn-save"); btn.innerText = "保存中..."; btn.disabled = true;
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            location.reload();
        } catch (e) { alert("失敗"); btn.disabled = false; btn.innerText = "保存する"; }
      };

      window.closePanel = () => document.getElementById("editor-panel").style.display = "none";
    </script>
</body>
</html>
