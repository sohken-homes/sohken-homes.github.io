<!DOCTYPE html>
<html>
<head>
    <title>不動産管理マップ v4.3.5</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        #editor-panel {
            display: none; position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 420px;
            max-height: 95vh; overflow-y: auto;
        }
        #editor-panel h3 { margin: 0 0 15px 0; font-size: 18px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; 
        }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        .flex-item { flex: 1; }
        .unit-label { font-size: 12px; color: #888; white-space: nowrap; width: 25px; }
        
        .sold-check-container { display: flex; align-items: center; gap: 8px; background: #fff1f0; padding: 10px; border-radius: 8px; border: 1px solid #ffa39e; margin-bottom: 10px; }
        .sold-check-container input { width: 20px; height: 20px; cursor: pointer; margin: 0; }
        .sold-check-container span { font-size: 14px; font-weight: bold; color: #cf1322; }

        #unit-price-container { background: #fffbe6; padding: 12px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; }
        .price-display { font-size: 16px; font-weight: bold; color: #d93025; }
        .siire-unit-box { background: #f6ffed; border: 1px solid #b7eb8f; padding: 10px; border-radius: 8px; margin-top: 5px; text-align: center; }
        .btn-save { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h3>物件登録・編集</h3>
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-lat">
        <input type="hidden" id="form-lng">

        <div class="sold-check-container">
            <input type="checkbox" id="form-is-sold">
            <span>成約済みとしてマーク</span>
        </div>

        <div class="section-title">基本情報</div>
        <div class="form-group">
            <label>物件種別</label>
            <select id="form-type">
                <option value="">選択してください</option>
                <optgroup label="他社分譲">
                    <option value="新築戸建">新築戸建</option>
                    <option value="中古戸建">中古戸建</option>
                    <option value="売地">売地</option>
                </optgroup>
                <optgroup label="自社分譲">
                    <option value="自社新築">自社新築</option>
                    <option value="自社中古">自社中古</option>
                    <option value="自社売地">自社売地</option>
                    <option value="自社新築(情開)">自社新築(情開)</option>
                    <option value="自社中古(情開)">自社中古(情開)</option>
                    <option value="自社売地(情開)">自社売地(情開)</option>
                    <option value="自社中古MS(情開)">自社中古MS(情開)</option>
                </optgroup>
                <optgroup label="マンション・その他">
                    <option value="新築MS">新築MS</option>
                    <option value="中古MS">中古MS</option>
                    <option value="査定依頼">査定依頼</option>
                    <option value="査定依頼MS">査定依頼MS</option>
                </optgroup>
            </select>
        </div>
        <div class="form-group"><label>区画名（物件名称）</label><input type="text" id="form-name"></div>
        <div class="form-group"><label>住所（市区 / 丁目 / 以降）</label>
            <div class="flex-row">
                <input type="text" id="form-addr1" placeholder="市区" class="flex-item">
                <input type="text" id="form-addr2" placeholder="丁目" class="flex-item">
                <input type="text" id="form-addr3" placeholder="以降" class="flex-item">
            </div>
        </div>

        <div class="section-title">価格推移 (単位: 万円)</div>
        <div class="form-group">
            <label>成約日 / 成約価格</label>
            <div class="flex-row" style="margin-bottom:10px;">
                <input type="text" id="form-d-s" placeholder="mm/dd" class="flex-item">
                <input type="text" id="form-p-s" placeholder="成約価格" class="comma-input flex-item">
            </div>
            <label>初回日 / 初回価格</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-d-first" placeholder="mm/dd" class="flex-item">
                <input type="text" id="form-p-first" placeholder="価格" class="comma-input flex-item">
            </div>
            <label>変更1日 / 変更1価格</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-d-c1" placeholder="mm/dd" class="flex-item">
                <input type="text" id="form-p-c1" placeholder="価格" class="comma-input flex-item">
            </div>
            <label>変更2日 / 変更2価格</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-d-c2" placeholder="mm/dd" class="flex-item">
                <input type="text" id="form-p-c2" placeholder="価格" class="comma-input flex-item">
            </div>
        </div>

        <div class="section-title">面積詳細</div>
        <div class="form-group">
            <label>土地面積</label>
            <div class="flex-row">
                <input type="text" id="form-t-m2" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">㎡</span>
                <input type="text" id="form-t-tsubo" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">坪</span>
            </div>
        </div>
        <div class="form-group">
            <label>建物面積 / 間取り</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-b-m2" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">㎡</span>
                <input type="text" id="form-b-tsubo" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">坪</span>
            </div>
            <input type="text" id="form-layout" placeholder="4LDK">
        </div>

        <div class="section-title">単価計算（自動判定）</div>
        <div id="unit-price-container">
            <div id="build-price-input" style="display:none; margin-bottom:10px;">
                <label style="font-size:10px; color:#c41d7f;">建物価格を入力（万円）</label>
                <input type="text" id="form-sub-price" placeholder="建物価格" class="comma-input">
            </div>
            <div>
                <div id="row-land" style="display:flex; justify-content:space-between; margin-bottom:4px;">
                    <span id="label-land" style="font-size:12px;">土地坪単価：</span>
                    <span id="val-land" class="price-display">- 万円</span>
                </div>
                <div id="row-build" style="display:none; justify-content:space-between;">
                    <span style="font-size:12px;">建物坪単価：</span>
                    <span id="val-build" class="price-display">- 万円</span>
                </div>
            </div>
        </div>

        <div class="section-title">業者・その他</div>
        <div class="form-group">
            <label>登録業者名 / 支店名</label>
            <div class="flex-row" style="margin-bottom:5px;">
                <input type="text" id="form-gyosha" placeholder="業者名" class="flex-item">
                <input type="text" id="form-shiten" placeholder="支店名" class="flex-item">
            </div>
            <div class="flex-row">
                <div class="flex-item"><label>取引態様</label><select id="form-taiyou"><option value="">選択</option><option value="売主">売主</option><option value="仲介(専)">仲介(専)</option><option value="仲介(一般)">仲介(一般)</option><option value="販売代理">販売代理</option></select></div>
                <div class="flex-item"><label>登録媒体</label><select id="form-media"><option value="">選択</option><option value="レインズ">レインズ</option><option value="仲介HP">仲介HP</option><option value="売主HP">売主HP</option><option value="ポータルサイト">ポータルサイト</option><option value="その他">その他</option></select></div>
            </div>
        </div>

        <div class="section-title">公法制限・接道</div>
        <div class="flex-row form-group">
            <div class="flex-item"><label>建蔽率</label><div class="flex-row"><input type="text" id="form-kenpei" class="comma-input"><span class="unit-label">%</span></div></div>
            <div class="flex-item"><label>容積率</label><div class="flex-row"><input type="text" id="form-youseki" class="comma-input"><span class="unit-label">%</span></div></div>
        </div>
        <div class="form-group"><input type="text" id="form-law" placeholder="第1種低層など" style="margin-bottom:5px;"><input type="text" id="form-road" placeholder="北4.0m公道など"></div>

        <div class="section-title">備考・URL</div>
        <div class="form-group"><input type="url" id="form-url1" placeholder="参考URL 1" style="margin-bottom:5px;"><input type="url" id="form-url2" placeholder="参考URL 2"></div>
        <div class="form-group"><label>全体メモ</label><textarea id="form-memo" rows="2"></textarea></div>
        <div class="form-group"><label>入力者</label><input type="text" id="form-user" placeholder="氏名"></div>

        <div class="section-title">仕入単価分析</div>
        <div class="form-group">
            <div class="flex-row" style="margin-bottom:8px;">
                <div class="flex-item"><label>購入価格（万円）</label><input type="text" id="siire-price" class="comma-input"></div>
                <div class="flex-item"><label>根拠</label><select id="siire-basis"><option value="">選択</option><option value="借入額">借入額</option><option value="予想金額">予想金額</option><option value="実績値">実績値</option></select></div>
            </div>
            <label>区画全体土地面積</label>
            <div class="flex-row">
                <input type="text" id="siire-m2" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">㎡</span>
                <input type="text" id="siire-tsubo" placeholder="0.00" class="comma-input flex-item" readonly style="background:#f5f5f5;"><span class="unit-label">坪</span>
            </div>
            <div class="siire-unit-box">
                <span style="font-size:11px; color:#52c41a;">仕入坪単価：</span>
                <span id="val-siire-unit" style="font-size:16px; font-weight:bold; color:#135200;">- 万円</span>
            </div>
        </div>

        <button class="btn-save" onclick="submitForm()">この内容で保存する</button>
        <button class="btn-cancel" onclick="closePanel()">キャンセル</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      const GAS_URL = "https://script.google.com/macros/s/AKfycbw9UqJp4Z2iWnocraWaoRrOKRyPtZ0fQ0FfVE-MUZPzzx-K_pww4z2BwqAtjOgCRYJC/exec";

      const ICON_MAP = {
          "新築戸建": "https://sohken-homes.github.io/icon_new_house.png",
          "中古戸建": "https://sohken-homes.github.io/icon_used_house.png",
          "売地": "https://sohken-homes.github.io/icon_land.png",
          "自社新築": "https://sohken-homes.github.io/icon_jisha_new.png", 
          "自社中古": "https://sohken-homes.github.io/icon_jisha_used.png",
          "自社売地": "https://sohken-homes.github.io/icon_jisha_land.png",
          "自社新築(情開)": "https://sohken-homes.github.io/icon_jisha_new_info.png",
          "自社中古(情開)": "https://sohken-homes.github.io/icon_jisha_used_info.png",
          "自社売地(情開)": "https://sohken-homes.github.io/icon_jisha_land_info.png",
          "自社中古MS(情開)": "https://sohken-homes.github.io/icon_jisha_ms_info.png",
          "新築MS": "https://sohken-homes.github.io/icon_new_ms.png",
          "中古MS": "https://sohken-homes.github.io/icon_used_ms.png",
          "査定依頼": "https://sohken-homes.github.io/icon_satei_land.png",
          "査定依頼MS": "https://sohken-homes.github.io/icon_satei_ms.png",
          "SOLD_新築戸建": "https://sohken-homes.github.io/sold_house.png",
          "SOLD_中古戸建": "https://sohken-homes.github.io/sold_house.png",
          "SOLD_売地": "https://sohken-homes.github.io/sold_land.png",
          "SOLD_新築MS": "https://sohken-homes.github.io/sold_ms.png",
          "SOLD_中古MS": "https://sohken-homes.github.io/sold_ms.png",
          "SOLD_査定依頼": "https://sohken-homes.github.io/sold_satei.png",
          "SOLD_査定依頼MS": "https://sohken-homes.github.io/sold_satei_ms.png",
          "DEFAULT": "http://maps.google.com/mapfiles/ms/icons/red-dot.png" 
      };

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
      script.async = true; script.defer = true;
      document.head.appendChild(script);

      let map, sharedInfoWindow, allData = [];

      // --- 日付ロジック ---
      function toFullDate(val) {
          if (!val) return "";
          if (/^\d{4}\//.test(val)) return val;
          if (/^\d{1,2}\/\d{1,2}/.test(val)) {
              return `${new Date().getFullYear()}/${val}`;
          }
          return val;
      }
      function toShortDate(val) {
          if (!val) return "";
          const parts = val.toString().split("/");
          return parts.length === 3 ? `${parts[1]}/${parts[2]}` : val;
      }

      // --- 数値・カンマ制御 ---
      function formatNumberWithComma(val) {
        if (!val && val !== 0) return "";
        const raw = val.toString().replace(/,/g, "");
        if (isNaN(raw)) return val;
        const parts = raw.split(".");
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join(".");
      }
      function removeComma(val) { return val.toString().replace(/,/g, ""); }

      function handleNumericInput(el) {
          el.addEventListener('focus', () => { el.value = removeComma(el.value); });
          el.addEventListener('blur', () => { el.value = formatNumberWithComma(el.value); updateAutoFields(); });
      }

      async function initMap() {
        const { Map, InfoWindow } = google.maps;
        map = new Map(document.getElementById("map"), { center: { lat: 35.700, lng: 139.630 }, zoom: 14, mapId: MAP_ID });
        sharedInfoWindow = new InfoWindow();
        map.addListener("click", () => { sharedInfoWindow.close(); closePanel(); });
        map.addListener("dblclick", (e) => addNewProperty(e.latLng.lat(), e.latLng.lng()));
        loadMarkers();
      }

      async function loadMarkers() {
        try {
            const res = await fetch(GAS_URL, { redirect: "follow" });
            allData = await res.json();
            const markers = allData.map(row => {
                if (!row["緯度"] || !row["経度"]) return null;
                const marker = new google.maps.marker.AdvancedMarkerElement({
                    position: { lat: Number(row["緯度"]), lng: Number(row["経度"]) },
                    map: map,
                    content: getMarkerContent(row["物件種別"], row["成約フラグ"] === true || row["成約フラグ"] === "TRUE")
                });
                marker.addListener("click", () => {
                    const fmt = (v) => v ? Number(v).toLocaleString() : "-";
                    let chain = fmt(row["販売価格（初回入力時/万円）"]);
                    if (row["変更価格１（万円）"]) chain += " → " + fmt(row["変更価格１（万円）"]);
                    if (row["成約価格（万円）"]) chain += " → <span style='color:#d93025; font-weight:bold;'>" + fmt(row["成約価格（万円）"]) + "</span>";
                    const cid = String(row["ID"]);
                    const html = `<div style="min-width:240px; padding:5px;">
                        <div style="font-weight:bold; border-bottom:1px solid #ddd; padding-bottom:5px;">${row["区画名"] || "未設定"}</div>
                        <div style="background:#fff1f0; padding:10px; margin:10px 0; border:1px solid #ffa39e; text-align:center; border-radius:5px;"><strong>${chain} 万円</strong></div>
                        <button id="btn-${cid}" style="width:100%; padding:10px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer;">詳細・編集を表示</button>
                    </div>`;
                    sharedInfoWindow.setContent(html);
                    sharedInfoWindow.open(map, marker);
                    google.maps.event.addListenerOnce(sharedInfoWindow, 'domready', () => {
                        const b = document.getElementById("btn-" + cid);
                        if (b) b.onclick = () => window.openEdit(cid);
                    });
                });
                return marker;
            }).filter(m => m !== null);
            new markerClusterer.MarkerClusterer({ map, markers });
        } catch (e) { console.error(e); }
      }

      function getMarkerContent(type, isSold) {
          const img = document.createElement("img");
          const targetTypes = ["新築戸建", "中古戸建", "売地", "新築MS", "中古MS", "査定依頼", "査定依頼MS"];
          let iconUrl = ICON_MAP[type] || ICON_MAP["DEFAULT"];
          if (isSold && targetTypes.includes(type)) {
              iconUrl = ICON_MAP["SOLD_" + type] || iconUrl;
          }
          img.src = iconUrl; img.style.width = "32px"; img.style.height = "32px"; img.style.cursor = "pointer";
          return img;
      }

      function updateAutoFields() {
        const type = document.getElementById('form-type').value;
        const pFirst = parseFloat(removeComma(document.getElementById('form-p-first').value)) || 0;
        const pS = parseFloat(removeComma(document.getElementById('form-p-s').value)) || 0;
        const subP = parseFloat(removeComma(document.getElementById('form-sub-price').value)) || 0;
        const lTsubo = parseFloat(removeComma(document.getElementById('form-t-tsubo').value)) || 0;
        const bTsubo = parseFloat(removeComma(document.getElementById('form-b-tsubo').value)) || 0;
        const siireP = parseFloat(removeComma(document.getElementById('siire-price').value)) || 0;
        const siireM2 = parseFloat(removeComma(document.getElementById('siire-m2').value)) || 0;

        const sTsubo = Math.floor((siireM2 * 0.3025) * 100) / 100;
        document.getElementById('siire-tsubo').value = formatNumberWithComma(sTsubo);
        document.getElementById('val-siire-unit').innerText = (siireP > 0 && sTsubo > 0) ? (Math.floor((siireP / sTsubo) * 10) / 10).toLocaleString() + " 万円" : "- 万円";

        const currentP = pS || parseFloat(removeComma(document.getElementById('form-p-c2').value)) || parseFloat(removeComma(document.getElementById('form-p-c1').value)) || pFirst;
        const ratio = pFirst > 0 ? (currentP / pFirst) : 1;
        const fmt = (n) => n.toLocaleString(undefined, {maximumFractionDigits: 1});

        document.getElementById('build-price-input').style.display = "none";
        document.getElementById('row-build').style.display = "none";
        document.getElementById('label-land').innerText = "土地坪単価：";

        const groupBuildInfo = ["新築戸建", "中古戸建", "自社新築", "自社中古", "自社新築(情開)", "自社中古(情開)"];
        const groupFloorOnly = ["自社中古MS(情開)", "新築MS", "中古MS", "査定依頼MS"];

        if (groupBuildInfo.includes(type)) {
            document.getElementById('build-price-input').style.display = "block";
            document.getElementById('row-build').style.display = "flex";
            if (subP > 0 && lTsubo > 0 && bTsubo > 0) {
                document.getElementById('val-land').innerText = fmt(((pFirst - subP) / lTsubo) * ratio) + " 万円";
                document.getElementById('val-build').innerText = fmt((subP / bTsubo) * ratio) + " 万円";
            }
        } else if (groupFloorOnly.includes(type)) {
            document.getElementById('label-land').innerText = "床単価：";
            if (bTsubo > 0) document.getElementById('val-land').innerText = fmt((pFirst / bTsubo) * ratio) + " 万円";
        } else if (lTsubo > 0) {
            document.getElementById('val-land').innerText = fmt((pFirst / lTsubo) * ratio) + " 万円";
        }
      }

      window.addEventListener('load', () => {
        document.querySelectorAll('.comma-input').forEach(el => handleNumericInput(el));
        document.getElementById('form-d-s').addEventListener('input', () => {
            if(document.getElementById('form-d-s').value.trim()) document.getElementById('form-is-sold').checked = true;
        });
        document.getElementById('form-p-s').addEventListener('blur', () => {
            if(removeComma(document.getElementById('form-p-s').value).trim()) document.getElementById('form-is-sold').checked = true;
        });

        const syncArea = (m2Id, tsuboId) => {
            document.getElementById(m2Id).addEventListener('blur', (e) => {
                const v = removeComma(e.target.value);
                if(v) document.getElementById(tsuboId).value = formatNumberWithComma(Math.floor((v * 0.3025) * 100) / 100);
                updateAutoFields();
            });
        };
        syncArea('form-t-m2', 'form-t-tsubo'); syncArea('form-b-m2', 'form-b-tsubo'); syncArea('siire-m2', 'siire-tsubo');
        document.getElementById('form-type').addEventListener('change', updateAutoFields);
      });

      window.addNewProperty = (lat, lng) => {
        document.getElementById("form-id").value = "";
        document.getElementById("form-lat").value = lat;
        document.getElementById("form-lng").value = lng;
        document.querySelectorAll('#editor-panel input, #editor-panel textarea, #editor-panel select').forEach(el => {
            if(!["form-lat","form-lng"].includes(el.id)) {
                if(el.type === 'checkbox') el.checked = false; else el.value = "";
            }
        });
        updateAutoFields();
        document.getElementById("editor-panel").style.display = "block";
      };

      window.openEdit = (id) => {
        const r = allData.find(d => String(d["ID"]) === String(id));
        if (!r) return;
        const setV = (id, val, isDate = false) => {
            const el = document.getElementById(id); if(!el) return;
            let finalVal = val || "";
            if(isDate) finalVal = toShortDate(finalVal);
            if(el.classList.contains('comma-input')) el.value = formatNumberWithComma(finalVal);
            else el.value = finalVal;
        };
        document.getElementById("form-id").value = r["ID"];
        document.getElementById("form-lat").value = r["緯度"];
        document.getElementById("form-lng").value = r["経度"];
        document.getElementById("form-is-sold").checked = (r["成約フラグ"] === true || r["成約フラグ"] === "TRUE");
        setV("form-type", r["物件種別"]); setV("form-name", r["区画名"]);
        setV("form-addr1", r["市・区"]); setV("form-addr2", r["所在（丁目まで）"]); setV("form-addr3", r["住居表示（丁目以降）"]);
        setV("form-d-first", r["初回価格入力日"], true); setV("form-p-first", r["販売価格（初回入力時/万円）"]);
        setV("form-d-c1", r["変更日1"], true); setV("form-p-c1", r["変更価格１（万円）"]);
        setV("form-d-c2", r["変更日2"], true); setV("form-p-c2", r["変更価格２（万円）"]);
        setV("form-d-s", r["成約日"], true); setV("form-p-s", r["成約価格（万円）"]);
        setV("form-sub-price", r["建物価格入力用"]);
        setV("form-t-m2", r["地積（㎡）"]); setV("form-t-tsubo", r["地積（坪）"]);
        setV("form-b-m2", r["床面積（㎡）"]); setV("form-b-tsubo", r["床面積（坪）"]);
        setV("form-layout", r["間取り"]); setV("form-gyosha", r["登録業者名"]);
        setV("form-shiten", r["支店名"]); setV("form-taiyou", r["取引態様"]);
        setV("form-media", r["登録媒体"]); setV("form-kenpei", r["建蔽率"]);
        setV("form-youseki", r["容積率"]); setV("form-law", r["公法制限"]);
        setV("form-road", r["接道"]); setV("form-url1", r["参考URL1"]);
        setV("form-url2", r["参考URL2"]); setV("form-memo", r["メモ"]);
        setV("form-user", r["入力者"]); setV("siire-price", r["購入価格"]);
        setV("siire-m2", r["仕入土地面積"]); setV("siire-basis", r["購入根拠"]);
        updateAutoFields();
        document.getElementById("editor-panel").style.display = "block";
        sharedInfoWindow.close();
      };

      window.submitForm = async () => {
        const getV = (id) => removeComma(document.getElementById(id).value);
        const data = {
          id: document.getElementById("form-id").value, lat: getV("form-lat"), lng: getV("form-lng"),
          is_sold: document.getElementById("form-is-sold").checked,
          type: document.getElementById("form-type").value, name: document.getElementById("form-name").value,
          addr1: document.getElementById("form-addr1").value, addr2: document.getElementById("form-addr2").value, addr3: document.getElementById("form-addr3").value,
          d_first: toFullDate(document.getElementById("form-d-first").value), p_first: getV("form-p-first"),
          d_c1: toFullDate(document.getElementById("form-d-c1").value), p_c1: getV("form-p-c1"),
          d_c2: toFullDate(document.getElementById("form-d-c2").value), p_c2: getV("form-p-c2"),
          d_s: toFullDate(document.getElementById("form-d-s").value), p_s: getV("form-p-s"), 
          sub_p: getV("form-sub-price"),
          land_unit: removeComma(document.getElementById("val-land").innerText.replace(" 万円","")),
          build_unit: removeComma(document.getElementById("val-build").innerText.replace(" 万円","")),
          t_m2: getV("form-t-m2"), t_tsubo: getV("form-t-tsubo"), b_m2: getV("form-b-m2"), b_tsubo: getV("form-b-tsubo"),
          layout: document.getElementById("form-layout").value, gyosha: document.getElementById("form-gyosha").value,
          shiten: document.getElementById("form-shiten").value, taiyou: document.getElementById("form-taiyou").value,
          media: document.getElementById("form-media").value, kenpei: getV("form-kenpei"),
          youseki: getV("form-youseki"), law: document.getElementById("form-law").value, road: document.getElementById("form-road").value,
          url1: document.getElementById("form-url1").value, url2: document.getElementById("form-url2").value,
          memo: document.getElementById("form-memo").value, user: document.getElementById("form-user").value,
          siire_p: getV("siire-price"), siire_m2: getV("siire-m2"), siire_basis: document.getElementById("siire-basis").value,
          siire_unit: removeComma(document.getElementById("val-siire-unit").innerText.replace(" 万円",""))
        };
        const btn = document.querySelector(".btn-save"); btn.innerText = "保存中..."; btn.disabled = true;
        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            location.reload();
        } catch (e) { alert("保存失敗"); btn.disabled = false; btn.innerText = "保存する"; }
      };
      window.closePanel = () => document.getElementById("editor-panel").style.display = "none";
    </script>
</body>
</html>
