<!DOCTYPE html>
<html>
<head>
    <title>不動産管理マップ v4.7.6</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        
        #search-box-container {
            position: absolute; top: 10px; left: 10px; z-index: 5;
            display: flex; gap: 5px; align-items: center;
        }
        #address-input {
            width: 180px; padding: 10px 15px; border: none; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 14px; outline: none;
        }
        #search-btn {
            padding: 10px 15px; background: #1a73e8; color: white; border: none; 
            border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 14px; font-weight: bold;
        }

        #editor-panel {
            display: none; position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 0; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 440px;
            max-height: 95vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .panel-header { padding: 15px 20px 10px 20px; background: white; flex-shrink: 0; }
        .panel-header h3 { margin: 0 0 5px 0; font-size: 18px; color: #1a73e8; }
        
        .tab-container { 
            display: flex; gap: 4px; padding: 0 15px; background: #f1f3f4; 
            border-bottom: 1px solid #ddd; overflow-x: auto; flex-shrink: 0;
        }
        .tab { 
            padding: 8px 16px; cursor: pointer; border: 1px solid transparent; 
            border-bottom: none; border-radius: 8px 8px 0 0; font-size: 13px; 
            color: #5f6368; white-space: nowrap; margin-top: 5px;
        }
        .tab.active { background: white; border-color: #ddd; color: #1a73e8; font-weight: bold; position: relative; top: 1px; }
        .tab-add { color: #188038; font-weight: bold; background: #e6f4ea; border-radius: 8px; margin-bottom: 5px;}

        .panel-body { padding: 15px 20px; overflow-y: auto; flex: 1; background: white; }
        .drag-notice { font-size: 10px; color: #e67e22; margin-bottom: 10px; font-weight: bold; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        .flex-item { flex: 1; }
        .unit-label { font-size: 12px; color: #888; white-space: nowrap; width: 25px; }
        .sold-inline { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #cf1322; font-weight: bold; }
        #unit-price-container { background: #fffbe6; padding: 12px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; }
        .price-display { font-size: 16px; font-weight: bold; color: #d93025; }
        .siire-unit-box { background: #f6ffed; border: 1px solid #b7eb8f; padding: 10px; border-radius: 8px; text-align: center; }
        
        .btn-save { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-delete { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        input[readonly] { background-color: #ffffff; color: #555; }
    </style>
</head>
<body>

    <div id="search-box-container">
        <input type="text" id="address-input" placeholder="住所で新規登録">
        <button id="search-btn" onclick="executeSearch()">検索</button>
    </div>

    <div id="editor-panel">
        <div class="panel-header">
            <h3>物件登録・編集</h3>
            <div class="drag-notice">※編集中のマーカーは地図上でドラッグ移動できます</div>
        </div>
        
        <div class="tab-container" id="tab-bar"></div>

        <div class="panel-body" id="form-container">
            <input type="hidden" id="form-id">
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">

            <div class="section-title">基本情報</div>
            <div class="form-group">
                <label>物件種別</label>
                <select id="form-type">
                    <option value="">選択してください</option>
                    <optgroup label="他社分譲"><option value="新築戸建">新築戸建</option><option value="中古戸建">中古戸建</option><option value="売地">売地</option></optgroup>
                    <optgroup label="自社分譲">
                        <option value="自社新築">自社新築</option><option value="自社中古">自社中古</option><option value="自社売地">自社売地</option>
                        <option value="自社新築(情開)">自社新築(情開)</option><option value="自社中古(情開)">自社中古(情開)</option><option value="自社売地(情開)">自社売地(情開)</option><option value="自社中古MS(情開)">自社中古MS(情開)</option>
                    </optgroup>
                    <optgroup label="マンション・その他"><option value="新築MS">新築MS</option><option value="中古MS">中古MS</option><option value="査定依頼">査定依頼</option><option value="査定依頼MS">査定依頼MS</option></optgroup>
                </select>
            </div>
            <div class="form-group"><label>区画名（物件名称）</label><input type="text" id="form-name"></div>
            <div class="form-group"><label>住所（市区 / 丁目 / 以降）</label>
                <div class="flex-row">
                    <input type="text" id="form-addr1" placeholder="市区" class="flex-item">
                    <input type="text" id="form-addr2" placeholder="丁目" class="flex-item">
                    <input type="text" id="form-addr3" placeholder="以降" class="flex-item">
                </div>
            </div>

            <div class="section-title">価格推移 (単位: 万円)</div>
            <div class="form-group">
                <label>初回入力日 / 初回価格</label>
                <div class="flex-row" style="margin-bottom:8px;">
                    <input type="text" id="form-d-first" placeholder="月/日 or 年/月/日(西暦)" class="flex-item date-input">
                    <input type="text" id="form-p-first" placeholder="価格" class="comma-input flex-item">
                </div>
                <label>変更日１ / 価格１</label>
                <div class="flex-row" style="margin-bottom:8px;">
                    <input type="text" id="form-d-c1" class="flex-item date-input">
                    <input type="text" id="form-p-c1" class="comma-input flex-item">
                </div>
                <label>変更日２ / 価格２</label>
                <div class="flex-row" style="margin-bottom:8px;">
                    <input type="text" id="form-d-c2" class="flex-item date-input">
                    <input type="text" id="form-p-c2" class="comma-input flex-item">
                </div>
                <label>変更日３ / 価格３</label>
                <div class="flex-row" style="margin-bottom:8px;">
                    <input type="text" id="form-d-c3" class="flex-item date-input">
                    <input type="text" id="form-p-c3" class="comma-input flex-item">
                </div>
                <div class="flex-row" style="justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <label style="margin:0;">成約日 / 成約価格</label>
                    <div class="sold-inline"><input type="checkbox" id="form-is-sold"> 成約済</div>
                </div>
                <div class="flex-row" style="margin-bottom:8px;">
                    <input type="text" id="form-d-s" class="flex-item date-input">
                    <input type="text" id="form-p-s" class="comma-input flex-item">
                </div>
                <label>備考/補足</label>
                <textarea id="form-price-memo" rows="2" placeholder="理由や履歴など"></textarea>
            </div>

            <div class="section-title">面積詳細</div>
            <div class="form-group">
                <label>土地面積 (㎡ / 坪)</label>
                <div class="flex-row">
                    <input type="text" id="form-t-m2" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">㎡</span>
                    <input type="text" id="form-t-tsubo" placeholder="0.00" class="comma-input flex-item" readonly><span class="unit-label">坪</span>
                </div>
            </div>
            <div class="form-group">
                <label>建物面積 (㎡ / 坪) / 間取り</label>
                <div class="flex-row" style="margin-bottom:5px;">
                    <input type="text" id="form-b-m2" placeholder="0.00" class="comma-input flex-item"><span class="unit-label">㎡</span>
                    <input type="text" id="form-b-tsubo" placeholder="0.00" class="comma-input flex-item" readonly><span class="unit-label">坪</span>
                </div>
                <input type="text" id="form-layout" placeholder="4LDK">
            </div>

            <div class="section-title">単価計算（自動反映）</div>
            <div id="unit-price-container">
                <div id="build-price-input" style="display:none; margin-bottom:10px;">
                    <label style="font-size:10px; color:#c41d7f;">建物価格を入力（万円）</label>
                    <input type="text" id="form-sub-price" placeholder="建物価格" class="comma-input">
                </div>
                <div id="calc-result-area">
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span id="label-land" style="font-size:12px;">土地坪単価：</span>
                        <span id="val-land" class="price-display">- 万円</span>
                    </div>
                </div>
            </div>

            <div class="section-title">業者・取引詳細</div>
            <div class="form-group">
                <label>登録業者名 / 支店名</label>
                <div class="flex-row" style="margin-bottom:5px;">
                    <input type="text" id="form-gyosha" placeholder="業者名" class="flex-item">
                    <input type="text" id="form-shiten" placeholder="支店名" class="flex-item">
                </div>
                <div class="form-group"><label>紹介担当者</label><input type="text" id="form-intro-user" placeholder="紹介者名/物件担当者名など"></div>
            </div>

            <div class="section-title">公法制限・接道</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;">
                    <div class="flex-item"><label>建蔽率 (%)</label><input type="text" id="form-kenpei" class="comma-input"></div>
                    <div class="flex-item"><label>容積率 (%)</label><input type="text" id="form-youseki" class="comma-input"></div>
                </div>
                <input type="text" id="form-law" placeholder="１低・１高・準防火など" style="margin-bottom:5px;">
                <input type="text" id="form-road" placeholder="東側公道◯◯ｍなど">
            </div>

            <div class="section-title">備考・URL・入力者</div>
            <div class="form-group"><label>参考URL</label><input type="url" id="form-url1" placeholder="https://..." style="margin-bottom:5px;"><input type="url" id="form-url2"></div>
            <div class="form-group"><label>全体メモ</label><textarea id="form-memo" rows="2" placeholder="メモ"></textarea></div>
            <div class="form-group"><label>入力者</label><input type="text" id="form-user" placeholder="担当者名"></div>

            <div class="section-title">仕入分析</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:8px;">
                    <div class="flex-item"><label>購入価格 (万円)</label><input type="text" id="siire-price" class="comma-input"></div>
                    <div class="flex-item"><label>根拠</label><select id="siire-basis"><option value="">選択</option><option value="借入額">借入額</option><option value="予想金額">予想金額</option><option value="実績値">実績値</option></select></div>
                </div>
                <div class="flex-row">
                    <input type="text" id="siire-m2" placeholder="土地㎡" class="comma-input flex-item"><span class="unit-label">㎡</span>
                    <input type="text" id="siire-tsubo" placeholder="坪" class="comma-input flex-item" readonly><span class="unit-label">坪</span>
                </div>
                <div class="siire-unit-box">
                    <span style="font-size:11px; color:#52c41a;">仕入坪単価：</span>
                    <span id="val-siire-unit" style="font-size:16px; font-weight:bold; color:#135200;">- 万円</span>
                </div>
            </div>

            <button class="btn-save" onclick="submitForm()">この内容で保存する</button>
            <button class="btn-cancel" onclick="closePanel()">キャンセル</button>
            <button class="btn-delete" id="delete-btn" onclick="deleteProperty()" style="display:none;">この物件を削除する</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxB110pOYk3MHyoN4mHT7GZS3WdR0QKkk6Ry-6mQ7iDhJ5pXIFa7wBFfdGZfvZMyLbh/exec";

      const ICON_MAP = {
          "新築戸建": "https://sohken-homes.github.io/icon_new_house.png",
          "中古戸建": "https://sohken-homes.github.io/icon_used_house.png",
          "売地": "https://sohken-homes.github.io/icon_land.png",
          "自社新築": "https://sohken-homes.github.io/icon_jisha_new.png", 
          "自社中古": "https://sohken-homes.github.io/icon_jisha_used.png",
          "自社売地": "https://sohken-homes.github.io/icon_jisha_land.png",
          "自社新築(情開)": "https://sohken-homes.github.io/icon_jisha_new_info.png",
          "自社中古(情開)": "https://sohken-homes.github.io/icon_jisha_used_info.png",
          "自社売地(情開)": "https://sohken-homes.github.io/icon_jisha_land_info.png",
          "自社中古MS(情開)": "https://sohken-homes.github.io/icon_jisha_ms_info.png",
          "新築MS": "https://sohken-homes.github.io/icon_new_ms.png",
          "中古MS": "https://sohken-homes.github.io/icon_used_ms.png",
          "査定依頼": "https://sohken-homes.github.io/icon_satei_land.png",
          "査定依頼MS": "https://sohken-homes.github.io/icon_satei_ms.png",
          "SOLD_新築戸建": "https://sohken-homes.github.io/sold_house.png",
          "SOLD_中古戸建": "https://sohken-homes.github.io/sold_house.png",
          "SOLD_売地": "https://sohken-homes.github.io/sold_land.png",
          "SOLD_新築MS": "https://sohken-homes.github.io/sold_ms.png",
          "SOLD_中古MS": "https://sohken-homes.github.io/sold_ms.png",
          "SOLD_査定依頼": "https://sohken-homes.github.io/sold_satei.png",
          "SOLD_査定依頼MS": "https://sohken-homes.github.io/sold_satei_ms.png",
          "DEFAULT": "http://maps.google.com/mapfiles/ms/icons/red-dot.png" 
      };

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
      script.async = true; document.head.appendChild(script);

      let map, sharedInfoWindow, geocoder, allData = [], currentEditingMarker = null, markersList = [];
      let currentTabs = []; let activeTabIndex = 0;

      function getMarkerContent(type, isSold) {
          const img = document.createElement("img");
          const targetTypes = ["新築戸建", "中古戸建", "売地", "新築MS", "中古MS", "査定依頼", "査定依頼MS"];
          let iconUrl = ICON_MAP[type] || ICON_MAP["DEFAULT"];
          if (isSold && targetTypes.includes(type)) iconUrl = ICON_MAP["SOLD_" + type] || iconUrl;
          img.src = iconUrl; img.style.width = "32px"; img.style.height = "32px"; img.style.cursor = "pointer";
          return img;
      }

      function formatNumberWithComma(val, fixedDigits = null) {
          if (!val && val !== 0) return "";
          let raw = val.toString().replace(/,/g, "");
          if (isNaN(raw)) return val;
          if (fixedDigits !== null) raw = parseFloat(raw).toFixed(fixedDigits);
          const parts = raw.split(".");
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          return parts.join(".");
      }
      function removeComma(val) { return val.toString().replace(/,/g, ""); }
      function formatToFullDate(val) {
          if (!val) return ""; let input = val.toString().trim();
          if (/^\d{4}\/\d{1,2}\/\d{1,2}/.test(input)) return input;
          if (/^\d{1,2}\/\d{1,2}$/.test(input)) {
              const currentYear = new Date().getFullYear();
              const [m, d] = input.split("/");
              return `${currentYear}/${m.padStart(2, '0')}/${d.padStart(2, '0')}`;
          }
          return input;
      }

      async function initMap() {
        const { Map, InfoWindow } = google.maps;
        map = new Map(document.getElementById("map"), { 
            center: { lat: 35.700, lng: 139.630 }, 
            zoom: 14, 
            mapId: MAP_ID,
            disableDoubleClickZoom: true 
        });
        sharedInfoWindow = new InfoWindow(); geocoder = new google.maps.Geocoder();
        map.addListener("click", () => { sharedInfoWindow.close(); closePanel(); });
        map.addListener("dblclick", (e) => addNewProperty(e.latLng.lat(), e.latLng.lng()));
        document.getElementById("address-input").addEventListener("keypress", (e) => {
            if(e.key === "Enter") executeSearch();
        });
        loadMarkers();
      }

      function executeSearch() {
          const address = document.getElementById("address-input").value;
          if(!address) return;
          geocoder.geocode({ address: address }, (results, status) => {
              if (status === "OK" && results[0]) {
                  const loc = results[0].geometry.location;
                  map.setCenter(loc); map.setZoom(17);
                  addNewProperty(loc.lat(), loc.lng());
              } else { alert("住所が見つかりませんでした"); }
          });
      }

      function renderTabs() {
        const bar = document.getElementById("tab-bar");
        bar.innerHTML = "";
        currentTabs.forEach((tab, index) => {
            const el = document.createElement("div");
            el.className = `tab ${index === activeTabIndex ? 'active' : ''}`;
            el.innerText = tab.label;
            el.onclick = (e) => { e.stopPropagation(); switchTab(index); };
            bar.appendChild(el);
        });
        const addBtn = document.createElement("div");
        addBtn.className = "tab tab-add";
        addBtn.innerText = "＋追加";
        addBtn.onclick = (e) => { e.stopPropagation(); addTab(); };
        bar.appendChild(addBtn);
      }

      function switchTab(index) {
        saveCurrentTabData();
        activeTabIndex = index;
        loadTabData(currentTabs[index].data);
        renderTabs();
      }

      function addTab() {
        saveCurrentTabData();
        const baseData = JSON.parse(JSON.stringify(currentTabs[0].data)); // 1区画目の全データをディープコピー
        baseData.id = ""; 
        baseData.name = "";
        baseData.d_first = ""; baseData.p_first = "";
        baseData.d_c1 = ""; baseData.p_c1 = "";
        baseData.d_c2 = ""; baseData.p_c2 = "";
        baseData.d_c3 = ""; baseData.p_c3 = "";
        baseData.d_s = ""; baseData.p_s = "";
        baseData.price_memo = ""; baseData.is_sold = false;
        baseData.t_m2 = ""; baseData.t_tsubo = "";
        baseData.b_m2 = ""; baseData.b_tsubo = "";
        baseData.layout = ""; baseData.sub_p = "";
        
        currentTabs.push({ label: `区画${currentTabs.length + 1}`, data: baseData });
        activeTabIndex = currentTabs.length - 1;
        loadTabData(baseData);
        renderTabs();
      }

      function saveCurrentTabData() {
        const data = currentTabs[activeTabIndex].data;
        const inputs = document.querySelectorAll('#form-container input, #form-container select, #form-container textarea');
        inputs.forEach(el => {
            if(el.id === "address-input") return;
            const key = el.id.replace('form-', '').replace('siire-', 'siire_');
            if(el.type === 'checkbox') data[key] = el.checked;
            else data[key] = removeComma(el.value);
        });
      }

      function loadTabData(data) {
        const inputs = document.querySelectorAll('#form-container input, #form-container select, #form-container textarea');
        inputs.forEach(el => {
            if(el.id === "address-input") return;
            const key = el.id.replace('form-', '').replace('siire-', 'siire_');
            const val = data[key] || "";
            if(el.type === 'checkbox') el.checked = !!val;
            else el.value = el.classList.contains('comma-input') ? formatNumberWithComma(val) : val;
        });
        document.getElementById("delete-btn").style.display = data.id ? "block" : "none";
        updateAutoFields();
      }

      function updateAutoFields() {
        const type = document.getElementById('form-type').value;
        const pFirst = parseFloat(removeComma(document.getElementById('form-p-first').value)) || 0;
        const pS = parseFloat(removeComma(document.getElementById('form-p-s').value)) || 0;
        const subP = parseFloat(removeComma(document.getElementById('form-sub-price').value)) || 0;
        const lTsubo = parseFloat(removeComma(document.getElementById('form-t-tsubo').value)) || 0;
        const bTsubo = parseFloat(removeComma(document.getElementById('form-b-tsubo').value)) || 0;
        const siireP = parseFloat(removeComma(document.getElementById('siire-price').value)) || 0;
        const siireM2 = parseFloat(removeComma(document.getElementById('siire-m2').value)) || 0;
        
        const sTsubo = Math.floor((siireM2 * 0.3025) * 100) / 100;
        document.getElementById('siire-tsubo').value = formatNumberWithComma(sTsubo, 2);
        document.getElementById('val-siire-unit').innerText = (siireP > 0 && sTsubo > 0) ? (Math.floor((siireP / sTsubo) * 10) / 10).toLocaleString() + " 万円" : "- 万円";

        const currentP = pS || parseFloat(removeComma(document.getElementById('form-p-c3').value)) || parseFloat(removeComma(document.getElementById('form-p-c2').value)) || parseFloat(removeComma(document.getElementById('form-p-c1').value)) || pFirst;
        const ratio = pFirst > 0 ? (currentP / pFirst) : 1;
        const fmt = (n) => n.toLocaleString(undefined, {maximumFractionDigits: 1});

        document.getElementById('build-price-input').style.display = "none";
        document.getElementById('calc-result-area').style.display = "block";
        document.getElementById('label-land').innerText = "土地坪単価：";

        if (["新築戸建", "中古戸建", "自社新築", "自社中古", "自社新築(情開)", "自社中古(情開)"].includes(type)) {
            document.getElementById('build-price-input').style.display = "block";
            if (subP > 0) {
                if (lTsubo > 0) document.getElementById('val-land').innerText = fmt(((pFirst - subP) / lTsubo) * ratio) + " 万円";
            }
        } else if (lTsubo > 0) {
            document.getElementById('val-land').innerText = fmt((pFirst / lTsubo) * ratio) + " 万円";
        }
      }

      window.addNewProperty = (lat, lng) => {
        if(currentEditingMarker && !currentEditingMarker.rowId) currentEditingMarker.map = null;
        const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat, lng }, map: map });
        marker.gmpDraggable = true;
        currentEditingMarker = marker;
        currentTabs = [{ label: "区画1", data: { lat: lat, lng: lng } }];
        activeTabIndex = 0;
        loadTabData(currentTabs[0].data);
        renderTabs();
        document.getElementById("editor-panel").style.display = "flex";
      };

      window.openEdit = (id) => {
        const r = allData.find(d => String(d["ID"]) === String(id));
        if (!r) return;
        const marker = markersList.find(m => m.rowId === id);
        if(marker) { marker.gmpDraggable = true; currentEditingMarker = marker; }
        
        currentTabs = [{ label: "区画1", data: {} }];
        const mapping = {
            "ID":"id", "緯度":"lat", "経度":"lng", "物件種別":"type", "区画名":"name",
            "市・区":"addr1", "所在（丁目まで）":"addr2", "住居表示（丁目以降）":"addr3",
            "初回価格入力日":"d_first", "販売価格（初回入力時/万円）":"p_first",
            "変更日1":"d_c1", "変更価格１（万円）":"p_c1", "変更日2":"d_c2", "変更価格２（万円）":"p_c2",
            "変更日3":"d_c3", "変更価格３（万円）":"p_c3", "成約日":"d_s", "成約価格（万円）":"p_s",
            "価格推移備考":"price_memo", "成約フラグ":"is_sold", "地積（㎡）":"t_m2", "地積（坪）":"t_tsubo",
            "床面積（㎡）":"b_m2", "床面積（坪）":"b_tsubo", "間取り":"layout", "建物価格入力用":"sub_p",
            "登録業者名":"gyosha", "支店名":"shiten", "取引態様":"taiyou", "登録媒体":"media",
            "紹介担当者":"intro_user", "建蔽率":"kenpei", "容積率":"youseki", "公法制限":"law",
            "接道":"road", "参考URL1":"url1", "参考URL2":"url2", "メモ":"memo", "入力者":"user",
            "購入価格":"siire_p", "仕入土地面積":"siire_m2", "購入根拠":"siire_basis"
        };
        Object.keys(mapping).forEach(k => currentTabs[0].data[mapping[k]] = r[k]);
        activeTabIndex = 0;
        loadTabData(currentTabs[0].data);
        renderTabs();
        document.getElementById("editor-panel").style.display = "flex";
      };

      window.submitForm = async () => {
        saveCurrentTabData();
        const btn = document.querySelector(".btn-save");
        btn.innerText = "保存中..."; btn.disabled = true;
        try {
            const firstId = currentTabs[0].data.id;
            for(let i=0; i < currentTabs.length; i++) {
                const data = currentTabs[i].data;
                data.mode = "save";
                if(i > 0) data.parent_id = firstId;
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            }
            location.reload();
        } catch (e) { alert("保存失敗"); btn.disabled = false; btn.innerText = "保存する"; }
      };

      window.deleteProperty = async () => {
          if(!confirm("この物件を完全に削除しますか？")) return;
          const id = document.getElementById("form-id").value;
          const btn = document.getElementById("delete-btn");
          btn.innerText = "削除中..."; btn.disabled = true;
          try {
              await fetch(GAS_URL, { method: "POST", body: JSON.stringify({id: id, mode: "delete"}) });
              location.reload();
          } catch (e) { alert("削除失敗"); btn.disabled = false; }
      }

      window.closePanel = () => {
          if(currentEditingMarker) {
              currentEditingMarker.gmpDraggable = false;
              if(!currentEditingMarker.rowId) currentEditingMarker.map = null;
              currentEditingMarker = null;
          }
          document.getElementById("editor-panel").style.display = "none";
          document.getElementById("address-input").value = "";
      };

      async function loadMarkers() {
        const res = await fetch(GAS_URL, { redirect: "follow" }); 
        allData = await res.json();
        markersList = allData.map(row => {
            if (!row["緯度"] || !row["経度"]) return null;
            const marker = new google.maps.marker.AdvancedMarkerElement({ 
                position: { lat: Number(row["緯度"]), lng: Number(row["経度"]) }, 
                map: map,
                content: getMarkerContent(row["物件種別"], row["成約フラグ"] === true || row["成約フラグ"] === "TRUE")
            });
            marker.rowId = String(row["ID"]);
            
            // クリックで情報ウィンドウ
            marker.addListener("click", (e) => {
                e.stop();
                const fmt = (v) => v ? Number(v).toLocaleString() : "-";
                sharedInfoWindow.setContent(`<div style="min-width:200px; padding:10px;">
                    <strong>${row["区画名"] || "未設定"}</strong><br>
                    価格: ${fmt(row["販売価格（初回入力時/万円）"])}万円<br>
                    <button onclick="openEdit('${marker.rowId}')" style="margin-top:10px; width:100%;">編集</button>
                </div>`);
                sharedInfoWindow.open(map, marker);
            });

            // 修正：ダブルクリックで即編集
            marker.addListener("dblclick", (e) => {
                e.stop();
                openEdit(marker.rowId);
            });
            
            return marker;
        }).filter(m => m !== null);
        new markerClusterer.MarkerClusterer({ map, markers: markersList });
      }

      window.addEventListener('load', () => {
        const container = document.getElementById("form-container");
        container.addEventListener('blur', (e) => {
            if(e.target.classList.contains('comma-input')) {
                if(!e.target.readOnly) e.target.value = formatNumberWithComma(e.target.value);
                updateAutoFields();
            }
            if(e.target.classList.contains('date-input')) e.target.value = formatToFullDate(e.target.value);
        }, true);
        container.addEventListener('focus', (e) => {
            if(e.target.classList.contains('comma-input')) e.target.value = removeComma(e.target.value);
        }, true);
        document.getElementById('form-type').addEventListener('change', updateAutoFields);
        const syncArea = (m2Id, tsuboId) => {
            const el = document.getElementById(m2Id);
            if(el) { el.addEventListener('blur', (e) => {
                const v = removeComma(e.target.value);
                if(v) document.getElementById(tsuboId).value = formatNumberWithComma(Math.floor((v * 0.3025) * 100) / 100, 2);
            });}
        };
        syncArea('form-t-m2', 'form-t-tsubo'); syncArea('form-b-m2', 'form-b-tsubo'); syncArea('siire-m2', 'siire-tsubo');
      });
    </script>
</body>
</html>
