<!DOCTYPE html>
<html>
<head>
    <title>スプレッドシート連動マップ</title>
    <meta charset="utf-8">
<style>
    /* bodyとhtmlの余白をゼロにする */
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        width: 100%; 
    }
    /* マップを画面の高さ100%にする */
    #map { 
        height: 100vh; /* vhは画面の高さに対するパーセント */
        width: 100%; 
    }
</style>
</head>
<body>
    <h2>マイ・データベース・マップ</h2>
    <p>スプレッドシートの内容が自動で反映されます。</p>
    <div id="map"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

    <script>
      const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
      const MAP_ID = "972a8c0d85fc17958d06f4b1";
      const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH2WhyFZJoWy_pegiP3tfx8169H_cFXOx_91hbOKE0pDG5z_-KpH54UUFSJHPaO21nYLFhGWIlVtDR/pub?gid=0&single=true&output=csv";

      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-writing platform key."):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: API_KEY,
        v: "weekly",
      });

      async function initMap() {
        const { Map, InfoWindow } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

        const map = new Map(document.getElementById("map"), {
          center: { lat: 35.681, lng: 139.767 },
          zoom: 10,
          mapId: MAP_ID,
          // --- 常にマウスホイールでズームします。Ctrlキーは不要です。 ---
          gestureHandling: "greedy", 
          // ------------------
        });

// 【修正箇所①】 InfoWindowをループの外側で「1つだけ」作成する
        const sharedInfoWindow = new InfoWindow();

        Papa.parse(CSV_URL, {
          download: true,
          header: true,
          complete: function(results) {
            const markers = results.data.map(row => {
              const lat = parseFloat(row["緯度"]);
              const lng = parseFloat(row["経度"]);
              if (isNaN(lat) || isNaN(lng)) return null;

              const marker = new AdvancedMarkerElement({
                position: { lat, lng },
                title: row["物件名称"],
              });

              // 【修正箇所②】 クリック時の処理を「共有の窓」を使うように変更
              marker.addListener("click", () => {
                // 1. 共有の窓の中身を、今クリックされた行のデータに書き換える
                sharedInfoWindow.setContent(`
                  <div class="info-window">
                    <strong style="font-size:1.2em;">${row["物件名称"]}</strong><br>
                    <b>業者名:</b> ${row["業者名"] || ""}<br>
                    <b>価格:</b> ${row["販売価格"] || ""}<br>
                    ${row["URL"] ? `<a href="${row["URL"]}" target="_blank">詳細リンク</a>` : ""}
                  </div>
                `);
                
                // 2. 共有の窓を開く（この時、他で開いていた窓は自動的に閉じます）
                sharedInfoWindow.open(map, marker);
              });

              return marker;
            }).filter(m => m !== null);

            // 2. クラスター化して地図に表示
            new markerClusterer.MarkerClusterer({ map, markers });
          }
        });
      }

      initMap();
    </script>
</body>
</html>
