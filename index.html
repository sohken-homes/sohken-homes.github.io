<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 不動産管理マップ</title>
    <style>
        body { font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-top: 0; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; color: #5f6368; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #1a73e8; }
        .btn { background: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #1557b0; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #error-msg { color: #d93025; font-size: 13px; margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>不動産管理マップ</h2>
    <div class="input-group">
        <label>入力者名（漢字・かな）</label>
        <input type="text" id="user-name" placeholder="例：山田 太郎">
    </div>
    <div class="input-group">
        <label>共通パスワード</label>
        <input type="password" id="user-pass" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">システムにログイン</button>
    <div id="error-msg"></div>
</div>

<script>
    // ★重要：ご自身の最新のGAS URLに書き換えてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwS41wZa5Wb2nBH5TzWY23aP-aw6OMyEY6x8zW_elTW1hadZgqgVLUoeRG8xNkKv6t-/exec";

    async function doLogin() {
        const nameInput = document.getElementById("user-name").value.trim();
        const passInput = document.getElementById("user-pass").value.trim();
        const errorMsg = document.getElementById("error-msg");
        const btn = document.getElementById("login-btn");

        errorMsg.style.display = "none";

        if (!nameInput || !passInput) {
            errorMsg.innerText = "名前とパスワードを両方入力してください。";
            errorMsg.style.display = "block";
            return;
        }

        btn.disabled = true;
        btn.innerText = "認証中...";

        try {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({
                    mode: "login",
                    userName: nameInput,
                    password: passInput
                })
            });
            const result = await res.json();

            if (result.success) {
                // セッション（ブラウザを閉じるまで有効な記憶領域）に「ログイン成功の証」と「名前」を保存
                sessionStorage.setItem("mapAuthStatus", "authorized");
                sessionStorage.setItem("mapUserName", nameInput);
                
                // マップ画面へ遷移
                window.location.href = "map.html";
            } else {
                throw new Error(result.error);
            }
        } catch (e) {
            errorMsg.innerText = e.message || "通信エラーが発生しました。";
            errorMsg.style.display = "block";
            btn.disabled = false;
            btn.innerText = "システムにログイン";
        }
    }
</script>

</body>
</html>
