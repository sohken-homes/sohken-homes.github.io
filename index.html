<!DOCTYPE html>
<html>
<head>
    <title>不動産管理マップ v5.1.0 (Full Featured + Highlight)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }

        /* サイドパネル */
        #side-panel {
            display: none; position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 420px;
            max-height: 95vh; overflow-y: auto;
        }

        /* 共通スタイル */
        h3 { margin: 0 0 10px 0; font-size: 18px; color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; }
        .section-title { font-size: 12px; font-weight: bold; color: #1a73e8; margin: 15px 0 8px 0; background: #e8f0fe; padding: 4px 8px; border-radius: 4px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; 
        }
        .flex-row { display: flex; gap: 8px; align-items: flex-end; }
        .flex-item { flex: 1; }
        .unit-label { font-size: 11px; color: #888; width: 20px; text-align: right; }

        /* 閲覧モード表示用 */
        .view-data-row { display: flex; border-bottom: 1px solid #f0f0f0; padding: 6px 0; font-size: 13px; }
        .view-data-label { width: 100px; color: #888; font-size: 11px; }
        .view-data-val { flex: 1; color: #333; font-weight: 500; }
        .price-hero { background: #fff1f0; padding: 15px; border-radius: 8px; border: 1px solid #ffa39e; text-align: center; margin: 10px 0; }
        .price-hero b { font-size: 22px; color: #d93025; }

        /* ボタン */
        .btn-main { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; margin-top: 15px; }
        .btn-sub { background: #fff; color: #666; border: 1px solid #ddd; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
        .sold-inline { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #cf1322; font-weight: bold; }

        /* ハイライトアニメーション */
        .marker-highlight-ring {
            width: 44px; height: 44px; background: rgba(26, 115, 232, 0.2);
            border: 2px solid #1a73e8; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse-ring 1.5s infinite; pointer-events: none;
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.7); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="side-panel">
        <div id="panel-view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="v-name">物件詳細</h3>
                <button onclick="switchToEdit()" class="btn-edit-top" style="background:#34a853; color:white; border:none; padding:5px 12px; border-radius:4px; cursor:pointer;">編集</button>
            </div>
            <div class="price-hero">現在の価格 <b id="v-price-hero">-</b> 万円</div>
            <div class="section-title">基本情報</div>
            <div class="view-data-row"><div class="view-data-label">物件種別</div><div id="v-type" class="view-data-val"></div></div>
            <div class="view-data-row"><div class="view-data-label">住所</div><div id="v-address" class="view-data-val"></div></div>
            <div class="section-title">土地・建物</div>
            <div class="view-data-row"><div class="view-data-label">土地面積</div><div id="v-land" class="view-data-val"></div></div>
            <div class="view-data-row"><div class="view-data-label">建物/間取</div><div id="v-build" class="view-data-val"></div></div>
            <div class="view-data-row"><div class="view-data-label">制限/接道</div><div id="v-law" class="view-data-val"></div></div>
            <div class="section-title">業者情報</div>
            <div class="view-data-row"><div class="view-data-label">業者/態様</div><div id="v-gyosha" class="view-data-val"></div></div>
            <div class="view-data-row"><div class="view-data-label">メモ</div><div id="v-memo" class="view-data-val" style="white-space:pre-wrap;"></div></div>
            <button class="btn-sub" onclick="closePanel()">閉じる</button>
        </div>

        <div id="panel-edit" style="display:none;">
            <h3>物件登録・編集</h3>
            <input type="hidden" id="form-id"><input type="hidden" id="form-lat"><input type="hidden" id="form-lng">
            
            <div class="section-title">基本情報</div>
            <div class="form-group"><label>物件種別</label><select id="form-type">
                <option value="">選択してください</option>
                <optgroup label="分譲"><option value="新築戸建">新築戸建</option><option value="中古戸建">中古戸建</option><option value="売地">売地</option></optgroup>
                <optgroup label="自社"><option value="自社新築">自社新築</option><option value="自社中古">自社中古</option><option value="自社売地">自社売地</option><option value="自社新築(情開)">自社新築(情開)</option></optgroup>
            </select></div>
            <div class="form-group"><label>区画名（物件名称）</label><input type="text" id="form-name"></div>
            <div class="form-group"><label>住所（自動取得済み）</label>
                <div class="flex-row">
                    <input type="text" id="form-addr1" placeholder="市区" class="flex-item">
                    <input type="text" id="form-addr2" placeholder="丁目" class="flex-item">
                    <input type="text" id="form-addr3" placeholder="以降" class="flex-item">
                </div>
            </div>

            <div class="section-title">価格推移 (万円)</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:8px;"><input type="text" id="form-d-first" placeholder="初回日" class="flex-item date-input"><input type="text" id="form-p-first" placeholder="価格" class="comma-input flex-item"></div>
                <div class="flex-row" style="margin-bottom:8px;"><input type="text" id="form-d-c1" placeholder="変更日1" class="flex-item date-input"><input type="text" id="form-p-c1" placeholder="価格" class="comma-input flex-item"></div>
                <div class="flex-row" style="justify-content: space-between; align-items: center; margin-bottom: 4px;"><label style="margin:0;">成約日 / 成約価格</label><div class="sold-inline"><input type="checkbox" id="form-is-sold"> 成約済</div></div>
                <div class="flex-row"><input type="text" id="form-d-s" placeholder="成約日" class="flex-item date-input"><input type="text" id="form-p-s" placeholder="価格" class="comma-input flex-item"></div>
            </div>

            <div class="section-title">面積・単価計算</div>
            <div class="form-group">
                <label>土地面積</label>
                <div class="flex-row"><input type="text" id="form-t-m2" class="comma-input flex-item">㎡<input type="text" id="form-t-tsubo" class="comma-input flex-item">坪</div>
            </div>
            <div class="form-group">
                <label>建物面積 / 間取り</label>
                <div class="flex-row" style="margin-bottom:5px;"><input type="text" id="form-b-m2" class="comma-input flex-item">㎡<input type="text" id="form-b-tsubo" class="comma-input flex-item">坪</div>
                <input type="text" id="form-layout" placeholder="4LDK">
            </div>
            <div id="unit-price-container">
                <div id="build-price-input" style="display:none; margin-bottom:8px;"><label style="font-size:10px; color:#c41d7f;">建物価格入力</label><input type="text" id="form-sub-price" class="comma-input"></div>
                <div style="display:flex; justify-content:space-between;"><span id="label-land" style="font-size:12px;">土地坪単価：</span><span id="val-land" class="price-display">- 万円</span></div>
            </div>

            <div class="section-title">業者・取引・制限</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;"><input type="text" id="form-gyosha" placeholder="業者名" class="flex-item"><input type="text" id="form-shiten" placeholder="支店名" class="flex-item"></div>
                <div class="flex-row">
                    <select id="form-taiyou" class="flex-item"><option value="">態様</option><option value="売主">売主</option><option value="仲介(専)">仲介(専)</option></select>
                    <select id="form-media" class="flex-item"><option value="">媒体</option><option value="レインズ">レインズ</option><option value="ポータル">ポータル</option></select>
                </div>
            </div>
            <div class="form-group">
                <div class="flex-row"><input type="text" id="form-kenpei" placeholder="建蔽%" class="flex-item"><input type="text" id="form-youseki" placeholder="容積%" class="flex-item"></div>
                <div class="flex-row" style="margin-top:5px;"><input type="text" id="form-law" placeholder="用途地域" class="flex-item"><input type="text" id="form-road" placeholder="接道" class="flex-item"></div>
            </div>
            <div class="form-group"><label>URL / メモ</label><input type="text" id="form-url1" placeholder="URL1" style="margin-bottom:5px;"><textarea id="form-memo" rows="2"></textarea></div>

            <div class="section-title">仕入分析</div>
            <div class="form-group">
                <div class="flex-row" style="margin-bottom:5px;"><input type="text" id="siire-price" class="comma-input flex-item" placeholder="購入価格"><select id="siire-basis" class="flex-item"><option value="">根拠</option><option value="実績">実績</option></select></div>
                <div class="flex-row"><input type="text" id="siire-m2" class="comma-input flex-item" placeholder="仕入㎡"><div id="val-siire-unit" style="font-size:12px; color:#135200; font-weight:bold;">- 万円</div></div>
            </div>

            <button class="btn-main" onclick="submitForm()">この内容で保存する</button>
            <button class="btn-sub" onclick="switchToView()">戻る</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script>
        const API_KEY = "AIzaSyAbKkX5ZgodyzaDSNFi4ThojOSKzJsI4rQ";
        const MAP_ID = "972a8c0d85fc17958d06f4b1";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw9UqJp4Z2iWnocraWaoRrOKRyPtZ0fQ0FfVE-MUZPzzx-K_pww4z2BwqAtjOgCRYJC/exec";

        let map, geocoder, allData = [], markersList = [], currentMarker = null, highlightDiv = null;

        function initApp() {
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=marker&v=weekly&callback=initMap`;
            document.head.appendChild(s);
        }

        async function initMap() {
            map = new google.maps.Map(document.getElementById("map"), { center: { lat: 35.700, lng: 139.630 }, zoom: 14, mapId: MAP_ID });
            geocoder = new google.maps.Geocoder();
            map.addListener("click", () => { if(!currentMarker) closePanel(); });
            map.addListener("dblclick", (e) => addNewProperty(e.latLng.lat(), e.latLng.lng()));
            loadMarkers();
        }

        // --- 強調表示 ---
        function setHighlight(marker) {
            if (highlightDiv) highlightDiv.remove();
            highlightDiv = document.createElement('div');
            highlightDiv.className = 'marker-highlight-ring';
            marker.content.appendChild(highlightDiv);
            marker.zIndex = 1000;
            currentMarker = marker;
        }

        // --- パネル制御 ---
        window.openView = (id) => {
            const data = allData.find(d => String(d["ID"]) === String(id));
            const marker = markersList.find(m => m.rowId === id);
            if (!data || !marker) return;

            setHighlight(marker);

            // 閲覧モードへの表示反映
            const setT = (id, val) => document.getElementById(id).innerText = val || "-";
            setT("v-name", data["区画名"]);
            setT("v-type", data["物件種別"]);
            setT("v-address", `${data["市・区"] || ""}${data["所在（丁目まで）"] || ""}${data["住居表示（丁目以降）"] || ""}`);
            setT("v-land", `${data["地積（㎡）"] || "-"}㎡ / ${data["地積（坪）"] || "-"}坪`);
            setT("v-build", `${data["床面積（坪）"] || "-"}坪 / ${data["間取り"] || "-"}`);
            setT("v-law", `建:${data["建蔽率"] || "-"}% / 容:${data["容積率"] || "-"}% / ${data["接道"] || "-"}`);
            setT("v-gyosha", `${data["登録業者名"] || "-"} (${data["取引態様"] || "-"})`);
            setT("v-memo", data["メモ"]);

            const currentP = data["成約価格（万円）"] || data["変更価格２（万円）"] || data["変更価格１（万円）"] || data["販売価格（初回入力時/万円）"] || "-";
            document.getElementById("v-price-hero").innerText = currentP.toLocaleString();

            fillEditForm(data);
            document.getElementById("side-panel").style.display = "block";
            document.getElementById("panel-view").style.display = "block";
            document.getElementById("panel-edit").style.display = "none";
        };

        // フォームへの流し込み（全項目）
        function fillEditForm(r) {
            const setV = (id, val) => {
                const el = document.getElementById(id); if(!el) return;
                el.value = el.classList.contains('comma-input') ? (val ? Number(val).toLocaleString() : "") : (val || "");
            };
            setV("form-id", r["ID"]); setV("form-lat", r["緯度"]); setV("form-lng", r["経度"]);
            setV("form-name", r["区画名"]); setV("form-type", r["物件種別"]);
            setV("form-addr1", r["市・区"]); setV("form-addr2", r["所在（丁目まで）"]); setV("form-addr3", r["住居表示（丁目以降）"]);
            setV("form-d-first", r["初回価格入力日"]); setV("form-p-first", r["販売価格（初回入力時/万円）"]);
            setV("form-d-s", r["成約日"]); setV("form-p-s", r["成約価格（万円）"]);
            setV("form-t-m2", r["地積（㎡）"]); setV("form-t-tsubo", r["地積（坪）"]);
            setV("form-b-m2", r["床面積（㎡）"]); setV("form-b-tsubo", r["床面積（坪）"]);
            setV("form-layout", r["間取り"]); setV("form-gyosha", r["登録業者名"]);
            setV("form-kenpei", r["建蔽率"]); setV("form-youseki", r["容積率"]);
            setV("form-law", r["用途地域"]); setV("form-road", r["接道"]);
            setV("form-memo", r["メモ"]); setV("siire-price", r["購入価格"]); setV("siire-m2", r["仕入土地面積"]);
            document.getElementById("form-is-sold").checked = (r["成約フラグ"] == "TRUE" || r["成約フラグ"] == true);
            updateAutoFields();
        }

        window.switchToEdit = () => {
            document.getElementById("panel-view").style.display = "none";
            document.getElementById("panel-edit").style.display = "block";
            if(currentMarker) currentMarker.gmpDraggable = true;
        };

        window.switchToView = () => {
            document.getElementById("panel-view").style.display = "block";
            document.getElementById("panel-edit").style.display = "none";
            if(currentMarker) currentMarker.gmpDraggable = false;
        };

        window.closePanel = () => {
            if(highlightDiv) highlightDiv.remove();
            if(currentMarker) { currentMarker.zIndex = null; currentMarker.gmpDraggable = false; }
            currentMarker = null;
            document.getElementById("side-panel").style.display = "none";
        };

        // --- 住所解析 (v4.5.5相当) ---
        async function fetchAddressAndFill(lat, lng) {
            geocoder.geocode({ location: { lat, lng } }, (results, status) => {
                if (status === "OK" && results[0]) {
                    const clean = results[0].formatted_address.replace(/^.*?[都道府県]/, "");
                    const cityMatch = clean.match(/^.*?[市区郡]/);
                    const city = cityMatch ? cityMatch[0] : "";
                    const rest = clean.replace(city, "").trim();
                    let chome = "", after = "", idx = rest.indexOf("丁目");
                    if (idx !== -1) { chome = rest.substring(0, idx+2); after = rest.substring(idx+2).trim(); }
                    else { const n = rest.match(/[0-9０-９]/); if(n) { chome = rest.substring(0, n.index); after = rest.substring(n.index); } else chome = rest; }
                    document.getElementById("form-addr1").value = city;
                    document.getElementById("form-addr2").value = chome;
                    document.getElementById("form-addr3").value = after;
                }
            });
        }

        window.addNewProperty = (lat, lng) => {
            closePanel();
            const marker = new google.maps.marker.AdvancedMarkerElement({ position: { lat, lng }, map: map, gmpDraggable: true });
            setHighlight(marker);
            fillEditForm({ "緯度": lat, "経度": lng });
            fetchAddressAndFill(lat, lng);
            document.getElementById("side-panel").style.display = "block";
            document.getElementById("panel-view").style.display = "none";
            document.getElementById("panel-edit").style.display = "block";
        };

        async function loadMarkers() {
            const res = await fetch(GAS_URL, { redirect: "follow" });
            allData = await res.json();
            markersList = allData.map(row => {
                if (!row["緯度"] || !row["経度"]) return null;
                const marker = new google.maps.marker.AdvancedMarkerElement({
                    position: { lat: Number(row["緯度"]), lng: Number(row["経度"]) },
                    map: map, content: createMarkerImg(row["物件種別"])
                });
                marker.rowId = String(row["ID"]);
                marker.addListener("click", () => openView(marker.rowId));
                return marker;
            }).filter(m => m !== null);
            new markerClusterer.MarkerClusterer({ map, markers: markersList });
        }

        function createMarkerImg(type) {
            const img = document.createElement("img");
            img.src = "https://sohken-homes.github.io/icon_land.png"; // 暫定
            img.style.width = "32px"; return img;
        }

        function removeComma(v) { return v.toString().replace(/,/g, ""); }

        function updateAutoFields() {
            const getF = (id) => parseFloat(removeComma(document.getElementById(id).value)) || 0;
            const type = document.getElementById("form-type").value;
            const pFirst = getF("form-p-first"), lTsubo = getF("form-t-tsubo"), bTsubo = getF("form-b-tsubo"), siireP = getF("siire-price"), siireM2 = getF("siire-m2");
            const sTsubo = Math.floor((siireM2 * 0.3025) * 100) / 100;
            document.getElementById("val-siire-unit").innerText = (siireP && sTsubo) ? (Math.floor(siireP/sTsubo*10)/10).toLocaleString() + "万円" : "-万円";
            document.getElementById("build-price-input").style.display = type.includes("戸建") ? "block" : "none";
        }

        initApp();
    </script>
</body>
</html>
